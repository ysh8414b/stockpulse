name: STOCKPULSE 크롤링

on:
  # 매일 한국시간 오후 4시 (장 마감 후) = UTC 07:00
  schedule:
    - cron: '0 7 * * 1-5'  # 월~금만 실행
  
  # 수동 실행 버튼
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 패키지 설치
        run: pip install requests beautifulsoup4
      
      - name: 크롤링 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python crawl.py
