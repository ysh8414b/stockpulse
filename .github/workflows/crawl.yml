name: STOCKPULSE 크롤링

on:
  schedule:
    # 장중 30분 간격 (한국시간 09:00~15:30 = UTC 00:00~06:30)
    - cron: '0,30 0-6 * * 1-5'
    # 장 마감 후 최종 1회 (한국시간 16:00 = UTC 07:00)
    - cron: '0 7 * * 1-5'

  # 수동 실행 버튼
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 패키지 설치
        run: pip install requests beautifulsoup4
      
      - name: 크롤링 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: python crawl.py
