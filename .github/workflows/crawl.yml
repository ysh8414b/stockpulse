name: STOCKPULSE 크롤링

on:
  schedule:
    # 장중 5분 간격 (한국시간 09:00~15:30 = UTC 00:00~06:30)
    - cron: '*/5 0-6 * * 1-5'
    # 장 마감 후 최종 1회 (한국시간 16:00 = UTC 07:00)
    - cron: '0 7 * * 1-5'

  # 수동 실행 버튼
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 패키지 설치
        run: pip install requests

      - name: 캐시 복원 (테마 매핑 DB + AI 테마 캐시)
        uses: actions/cache@v4
        with:
          path: |
            theme_stock_map.json
            ai_themes_cache.json
          key: theme-cache-${{ hashFiles('crawl.py') }}-${{ github.run_id }}
          restore-keys: |
            theme-cache-${{ hashFiles('crawl.py') }}-
            theme-cache-

      - name: 크롤링 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python crawl.py
