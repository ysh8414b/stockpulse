<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 브리핑 아카이브 — STOCKPULSE</title>
  <meta name="description" content="STOCKPULSE AI 시장 브리핑 아카이브. 과거 1년간의 AI 기반 시장 분석을 날짜별로 확인하세요." />
  <meta property="og:title" content="AI 브리핑 아카이브 — STOCKPULSE" />
  <meta property="og:description" content="과거 1년간의 AI 기반 시장 분석을 날짜별로 확인하세요." />
  <link rel="canonical" href="https://ysh8414b.github.io/stockpulse/archive.html" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="shared.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo}=React;

function Box({children,style,hover=true,className=""}){
  const[h,setH]=useState(false);
  return <div className={className} style={{background:h&&hover?"var(--card-hbg)":"var(--card-bg)",border:"1px solid",borderColor:h&&hover?"var(--card-hbd)":"var(--card-bd)",borderRadius:"12px",padding:"18px 22px",transition:"all .25s",...style}} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}>{children}</div>;
}

function Loader(){return <div style={{display:"flex",justifyContent:"center",padding:"60px 0"}}><div style={{width:28,height:28,border:"3px solid var(--div3)",borderTop:"3px solid #06b6d4",borderRadius:"50%",animation:"spin 1s linear infinite"}}/></div>}

// ═══ AI 브리핑 파서 (index.html TabAI와 동일) ═══
const secIcons={"핵심":"🔥","파급":"🔥","촉발":"🔥","환율":"💱","금리":"📈","유가":"📈","연쇄":"📈","선물":"📈","수급":"💰","외인":"💰","기관":"💰","자금":"💰","패닉":"🩺","체력":"🩺","진단":"🩺","섹터":"📊","강약":"📊","테마":"🎯","모멘텀":"🎯","매매":"⚔️","전략":"⚔️","대응":"⚔️","리스크":"⚔️","반등":"⏭️","트리거":"⏭️","하락":"⏭️","결론":"🧠","시나리오":"🔮","해외":"🌍","국내":"🇰🇷","영향":"🇰🇷","체크":"📋","전망":"📋"};
const secColors={"핵심":"239,68,68","파급":"239,68,68","촉발":"239,68,68","환율":"245,158,11","금리":"245,158,11","유가":"245,158,11","연쇄":"245,158,11","선물":"245,158,11","수급":"99,102,241","외인":"99,102,241","기관":"99,102,241","자금":"99,102,241","패닉":"59,130,246","체력":"59,130,246","진단":"59,130,246","섹터":"139,92,246","강약":"139,92,246","테마":"168,85,247","모멘텀":"168,85,247","매매":"239,68,68","전략":"239,68,68","대응":"239,68,68","리스크":"239,68,68","반등":"6,182,212","트리거":"6,182,212","하락":"6,182,212","결론":"34,197,94","시나리오":"6,182,212","해외":"99,102,241","국내":"59,130,246","영향":"59,130,246","체크":"168,85,247","전망":"168,85,247"};
const getSecMeta=(title)=>{for(const[k,v]of Object.entries(secIcons)){if(title.includes(k))return{icon:v,clr:secColors[k]}}return{icon:"📌",clr:"107,114,128"}};
const parseSections=(text)=>{
  if(!text)return[];
  const lines=text.split("\n");const sections=[];let cur=null;
  for(const line of lines){const t=line.trim();if(!t)continue;if(/^\d[\.\)]/.test(t)){if(cur)sections.push(cur);const title=t.replace(/^\d[\.\)]\s*/,"");cur={title,lines:[]};}else if(cur){cur.lines.push(t)}else{if(!sections.length){cur={title:"",lines:[t]}}}}
  if(cur)sections.push(cur);return sections;
};
const moodMap={bullish:{emoji:"🟢",label:"강세",color:"#22c55e"},bearish:{emoji:"🔴",label:"약세",color:"#ef4444"},neutral:{emoji:"⚪",label:"보합",color:"#6b7280"}};
const modeLabels={"08":"장전 해외시장","12":"장중","15":"장 마감"};

function BriefingView({briefing}){
  if(!briefing)return null;
  const mood=moodMap[briefing.market_mood]||moodMap.neutral;
  return <div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        <span style={{width:36,height:36,borderRadius:"10px",background:"rgba(6,182,212,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px"}}>⬡</span>
        <div><div style={{fontWeight:700,fontSize:"17px"}}>{briefing.date} 시장 브리핑</div><div style={{color:"var(--muted)",fontSize:"13px",marginTop:"2px"}}>{briefing.generated_time||""} 기준 · {modeLabels[briefing.generated_time?.substring(0,2)]||""}</div></div>
      </div>
      <span style={{padding:"5px 14px",borderRadius:"20px",fontSize:"14px",fontWeight:600,background:`rgba(${mood.color==="#22c55e"?"34,197,94":mood.color==="#ef4444"?"239,68,68":"107,114,128"},0.1)`,color:mood.color,display:"flex",alignItems:"center",gap:"5px"}}>{mood.emoji} {mood.label}</span>
    </div>
    <div style={{display:"grid",gap:"12px"}}>{parseSections(briefing.summary).map((sec,si)=>{
      const meta=getSecMeta(sec.title);const isConclusion=sec.title.includes("결론");
      return <Box key={si} className="ai-section" style={{padding:isConclusion?"20px 22px":"18px 22px",borderLeft:`3px solid rgba(${meta.clr},0.5)`,background:isConclusion?`rgba(${meta.clr},0.04)`:"transparent"}} hover={false}>
        {sec.title&&<div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}}><span style={{fontSize:"17px"}}>{meta.icon}</span><span style={{fontWeight:700,fontSize:"16px",color:"var(--text)"}}>{sec.title}</span></div>}
        <div style={{fontSize:"15px",lineHeight:1.8,color:"var(--text-sub)"}}>{sec.lines.map((l,li)=>{
          const isArrow=l.includes("→");const isBullet=/^[↘↗📌👉·\-\*]/.test(l);
          return <div key={li} style={{marginBottom:li<sec.lines.length-1?"6px":"0",paddingLeft:isBullet?"4px":"0",color:isArrow?"var(--text)":"inherit",fontWeight:isArrow?500:"normal"}}>{l}</div>
        })}</div>
      </Box>
    })}</div>
  </div>;
}

function MonthCalendar({year,month,data,selectedDate,onSelect}){
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const days=["일","월","화","수","목","금","토"];
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);

  const dataByDate=useMemo(()=>{
    const m={};
    if(data)data.forEach(r=>{
      const d=r.date;
      if(!m[d])m[d]=[];
      m[d].push(r);
    });
    return m;
  },[data]);

  const pad=n=>n<10?"0"+n:""+n;

  return <div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"2px",marginBottom:"4px"}}>
      {days.map(d=><div key={d} style={{textAlign:"center",fontSize:"12px",color:"var(--muted)",padding:"6px 0",fontWeight:600}}>{d}</div>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"2px"}}>
      {cells.map((d,i)=>{
        if(d===null)return <div key={i}/>;
        const dateStr=`${year}-${pad(month+1)}-${pad(d)}`;
        const dayData=dataByDate[dateStr];
        const hasBriefing=!!dayData;
        const isSelected=selectedDate===dateStr;
        const isToday=dateStr===new Date().toISOString().slice(0,10);
        const latestMood=dayData?dayData[dayData.length-1].market_mood:null;
        const moodDot=latestMood?moodMap[latestMood]:null;
        const dayOfWeek=(firstDay+d-1)%7;
        const isWeekend=dayOfWeek===0||dayOfWeek===6;

        return <div key={i} onClick={()=>hasBriefing&&onSelect(dateStr)} style={{
          textAlign:"center",padding:"8px 4px",borderRadius:"8px",cursor:hasBriefing?"pointer":"default",
          background:isSelected?"rgba(6,182,212,0.12)":isToday?"rgba(255,255,255,0.03)":"transparent",
          border:isSelected?"1px solid rgba(6,182,212,0.3)":isToday?"1px solid var(--div3)":"1px solid transparent",
          opacity:hasBriefing?1:0.35,transition:"all .2s",minHeight:"52px"
        }} onMouseEnter={e=>{if(hasBriefing&&!isSelected)e.currentTarget.style.background="rgba(6,182,212,0.06)"}} onMouseLeave={e=>{if(!isSelected)e.currentTarget.style.background=isToday?"rgba(255,255,255,0.03)":"transparent"}}>
          <div style={{fontSize:"14px",fontWeight:isToday?700:isSelected?600:400,color:isWeekend&&!isSelected?"var(--dim)":"var(--text)"}}>{d}</div>
          {moodDot&&<div style={{marginTop:"4px",display:"flex",justifyContent:"center",gap:"3px"}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:moodDot.color}}/>
            {dayData.length>1&&<div style={{fontSize:"10px",color:"var(--muted)"}}>{dayData.length}</div>}
          </div>}
        </div>;
      })}
    </div>
  </div>;
}

function App(){
  const[theme,setTheme]=useState(getStoredTheme());
  const[year,setYear]=useState(new Date().getFullYear());
  const[month,setMonth]=useState(new Date().getMonth());
  const[monthData,setMonthData]=useState(null);
  const[selectedDate,setSelectedDate]=useState(null);
  const[dayBriefings,setDayBriefings]=useState(null);
  const[selectedIdx,setSelectedIdx]=useState(0);
  const[loading,setLoading]=useState(true);

  useEffect(()=>{document.body.className=theme==="light"?"light":"";setStoredTheme(theme)},[theme]);

  const pad=n=>n<10?"0"+n:""+n;

  useEffect(()=>{
    setLoading(true);
    const startDate=`${year}-${pad(month+1)}-01`;
    const endDay=new Date(year,month+1,0).getDate();
    const endDate=`${year}-${pad(month+1)}-${pad(endDay)}`;
    db("ai_summary",`select=date,market_mood,generated_time&date=gte.${startDate}&date=lte.${endDate}&order=date,generated_time`).then(d=>{
      setMonthData(d||[]);
      setLoading(false);
      // 현재 월이면 오늘 또는 가장 최근 날짜 자동 선택
      if(d&&d.length>0){
        const today=new Date().toISOString().slice(0,10);
        const dates=[...new Set(d.map(r=>r.date))];
        const match=dates.includes(today)?today:dates[dates.length-1];
        setSelectedDate(match);
      }else{
        setSelectedDate(null);
        setDayBriefings(null);
      }
    });
  },[year,month]);

  useEffect(()=>{
    if(!selectedDate){setDayBriefings(null);return;}
    setSelectedIdx(0);
    db("ai_summary",`date=eq.${selectedDate}&order=generated_time`).then(d=>setDayBriefings(d||[]));
  },[selectedDate]);

  const prevMonth=()=>{if(month===0){setMonth(11);setYear(y=>y-1)}else setMonth(m=>m-1)};
  const nextMonth=()=>{if(month===11){setMonth(0);setYear(y=>y+1)}else setMonth(m=>m+1)};
  const isCurrentMonth=year===new Date().getFullYear()&&month===new Date().getMonth();

  return <div>
    <header className="page-header" style={{maxWidth:1440}}>
      <a href="index.html" className="page-back">← 대시보드</a>
      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        <a href="index.html" style={{display:"flex",alignItems:"center",gap:"8px"}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:"#22c55e",boxShadow:"0 0 10px rgba(34,197,94,0.4)"}}/>
          <span style={{fontSize:"18px",fontWeight:800,letterSpacing:"-0.03em",background:"var(--h-grad)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>STOCKPULSE</span>
        </a>
        <button onClick={()=>setTheme(t=>t==="dark"?"light":"dark")} style={{width:34,height:34,borderRadius:"8px",border:"1px solid var(--card-bd)",background:"var(--card-bg)",cursor:"pointer",fontSize:"16px",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .25s"}}>{theme==="dark"?"☀️":"🌙"}</button>
      </div>
    </header>

    <main className="page-wrap" style={{maxWidth:1440,padding:"0 40px 60px"}}>
      <div className="fade-up" style={{marginBottom:"32px"}}>
        <h1 style={{fontSize:"24px",fontWeight:800,marginBottom:"6px"}}><span style={{color:"#06b6d4"}}>⬡</span> AI 브리핑 아카이브</h1>
        <p style={{color:"var(--muted)",fontSize:"15px"}}>과거 AI 시장 브리핑을 날짜별로 탐색하세요. 최대 1년간 보관됩니다.</p>
      </div>

      <div className="archive-grid">
        {/* 캘린더 패널 */}
        <Box hover={false} className="sticky-cal" style={{padding:"20px",position:"sticky",top:"20px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
            <button onClick={prevMonth} style={{width:32,height:32,borderRadius:"8px",border:"1px solid var(--card-bd)",background:"var(--card-bg)",cursor:"pointer",color:"var(--text)",fontSize:"16px",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>←</button>
            <span style={{fontWeight:700,fontSize:"16px"}}>{year}년 {month+1}월</span>
            <button onClick={nextMonth} disabled={isCurrentMonth} style={{width:32,height:32,borderRadius:"8px",border:"1px solid var(--card-bd)",background:"var(--card-bg)",cursor:isCurrentMonth?"not-allowed":"pointer",color:isCurrentMonth?"var(--dimmer)":"var(--text)",fontSize:"16px",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s",opacity:isCurrentMonth?0.4:1}}>→</button>
          </div>
          {loading?<Loader/>:<MonthCalendar year={year} month={month} data={monthData} selectedDate={selectedDate} onSelect={setSelectedDate}/>}
          <div style={{marginTop:"14px",display:"flex",gap:"12px",justifyContent:"center",fontSize:"12px",color:"var(--muted)"}}>
            <span style={{display:"flex",alignItems:"center",gap:"4px"}}><span style={{width:6,height:6,borderRadius:"50%",background:"#22c55e",display:"inline-block"}}/>강세</span>
            <span style={{display:"flex",alignItems:"center",gap:"4px"}}><span style={{width:6,height:6,borderRadius:"50%",background:"#ef4444",display:"inline-block"}}/>약세</span>
            <span style={{display:"flex",alignItems:"center",gap:"4px"}}><span style={{width:6,height:6,borderRadius:"50%",background:"#6b7280",display:"inline-block"}}/>보합</span>
          </div>
        </Box>

        {/* 브리핑 패널 */}
        <div className="fade-up">
          {selectedDate&&dayBriefings?
            dayBriefings.length>0?<div>
              {dayBriefings.length>1&&<div style={{display:"flex",gap:"4px",marginBottom:"16px"}}>
                {dayBriefings.map((b,i)=><button key={i} onClick={()=>setSelectedIdx(i)} style={{
                  padding:"8px 16px",borderRadius:"8px",border:"1px solid",fontFamily:"inherit",fontSize:"13px",cursor:"pointer",
                  borderColor:selectedIdx===i?"rgba(6,182,212,0.3)":"var(--card-bd)",
                  background:selectedIdx===i?"rgba(6,182,212,0.1)":"var(--card-bg)",
                  color:selectedIdx===i?"#06b6d4":"var(--muted)",fontWeight:selectedIdx===i?600:400,transition:"all .2s"
                }}>{b.generated_time} {modeLabels[b.generated_time?.substring(0,2)]||""}</button>)}
              </div>}
              <BriefingView briefing={dayBriefings[selectedIdx]||dayBriefings[0]}/>
            </div>
            :<Box hover={false} style={{padding:"40px",textAlign:"center"}}>
              <div style={{fontSize:"36px",marginBottom:"12px",opacity:0.4}}>⬡</div>
              <div style={{fontWeight:600,color:"var(--muted)"}}>이 날짜의 브리핑이 없습니다</div>
            </Box>
          :<Box hover={false} style={{padding:"60px 40px",textAlign:"center"}}>
            <div style={{fontSize:"48px",marginBottom:"16px",opacity:0.3}}>📅</div>
            <div style={{fontWeight:600,fontSize:"17px",color:"var(--muted)",marginBottom:"6px"}}>날짜를 선택하세요</div>
            <div style={{fontSize:"14px",color:"var(--dim)"}}>캘린더에서 날짜를 클릭하면 해당 날의 AI 브리핑을 볼 수 있습니다</div>
          </Box>}
        </div>
      </div>
    </main>

    <footer style={{borderTop:"1px solid var(--div2)",maxWidth:1440,margin:"0 auto",padding:"18px 40px",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:"8px",color:"var(--dimmer)",fontSize:"13px"}}>
      <div><span style={{fontWeight:600,color:"var(--dim)"}}>STOCKPULSE</span> © 2026</div>
      <div className="footer-links">
        <a href="index.html">대시보드</a>
        <a href="guide.html">투자 가이드</a>
        <a href="about.html">서비스 소개</a>
        <a href="privacy.html">개인정보처리방침</a>
        <a href="terms.html">이용약관</a>
      </div>
    </footer>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
