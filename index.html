<!DOCTYPE html>

<head>

  <style>
    :root{
      --bg:#07070c;--text:#e0ded8;--text-sub:#b0b0b0;--muted:#6b7280;--dim:#555;--dimmer:#444;
      --card-bg:rgba(255,255,255,0.02);--card-bd:rgba(255,255,255,0.06);
      --card-hbg:rgba(255,255,255,0.035);--card-hbd:rgba(255,255,255,0.1);
      --div:rgba(255,255,255,0.04);--div2:rgba(255,255,255,0.05);--div3:rgba(255,255,255,0.06);
      --inp-bg:rgba(255,255,255,0.05);--inp-bd:rgba(255,255,255,0.1);
      --tab-bg:rgba(255,255,255,0.07);--tab-bd:rgba(255,255,255,0.1);
      --ticker-bg:linear-gradient(90deg,#0a0a12,#0e0e1a,#0a0a12);
      --hover:rgba(255,255,255,0.03);--hover2:rgba(255,255,255,0.015);
      --badge-bg:rgba(255,255,255,0.05);--badge-bg2:rgba(255,255,255,0.04);
      --h-grad:linear-gradient(135deg,#e0ded8 30%,#888 100%);
      --glow1:rgba(6,182,212,0.03);--glow2:rgba(139,92,246,0.025);
      --skel1:rgba(255,255,255,0.04);--skel2:rgba(255,255,255,0.08);
      --scroll-thumb:rgba(255,255,255,0.1);
      --row-head:rgba(255,255,255,0.025);
    }
    .light{
      --bg:#f5f5f7;--text:#1a1a2e;--text-sub:#444;--muted:#6b7280;--dim:#9ca3af;--dimmer:#b0b0b0;
      --card-bg:#ffffff;--card-bd:rgba(0,0,0,0.08);
      --card-hbg:rgba(0,0,0,0.03);--card-hbd:rgba(0,0,0,0.15);
      --div:rgba(0,0,0,0.06);--div2:rgba(0,0,0,0.08);--div3:rgba(0,0,0,0.1);
      --inp-bg:rgba(0,0,0,0.03);--inp-bd:rgba(0,0,0,0.12);
      --tab-bg:rgba(0,0,0,0.06);--tab-bd:rgba(0,0,0,0.12);
      --ticker-bg:linear-gradient(90deg,#e8e8f0,#eff0f5,#e8e8f0);
      --hover:rgba(0,0,0,0.03);--hover2:rgba(0,0,0,0.015);
      --badge-bg:rgba(0,0,0,0.05);--badge-bg2:rgba(0,0,0,0.04);
      --h-grad:linear-gradient(135deg,#1a1a2e 30%,#555 100%);
      --glow1:transparent;--glow2:transparent;
      --skel1:rgba(0,0,0,0.04);--skel2:rgba(0,0,0,0.08);
      --scroll-thumb:rgba(0,0,0,0.15);
      --row-head:rgba(0,0,0,0.03);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .3s,color .3s}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:3px}
    ::selection{background:rgba(6,182,212,0.3)}
    @keyframes tickerScroll{0%{transform:translate3d(0,0,0)}100%{transform:translate3d(-50%,0,0)}}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
    @keyframes liveBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(6,182,212,0.2)}50%{box-shadow:0 0 20px rgba(6,182,212,0.4)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .fade-up{animation:fadeUp .55s cubic-bezier(.16,1,.3,1) both}
    .fade-up-d1{animation-delay:.05s}.fade-up-d2{animation-delay:.1s}.fade-up-d3{animation-delay:.15s}.fade-up-d4{animation-delay:.2s}
    @media(max-width:900px){.chat-side-panel{position:fixed!important;top:0!important;right:0!important;bottom:0!important;width:100%!important;max-width:380px!important;height:100vh!important;z-index:999!important;box-shadow:-4px 0 20px rgba(0,0,0,0.3)!important}}
    @media(max-width:600px){.chat-side-panel{max-width:100%!important}}
    .skeleton{background:linear-gradient(90deg,var(--skel1) 25%,var(--skel2) 50%,var(--skel1) 75%);background-size:200% 100%;animation:shimmer 1.8s infinite;border-radius:6px}
    body::before{content:'';position:fixed;top:-40%;left:-20%;width:80%;height:80%;background:radial-gradient(ellipse,var(--glow1) 0%,transparent 70%);pointer-events:none;z-index:0;transition:background .5s}
    body::after{content:'';position:fixed;bottom:-30%;right:-15%;width:60%;height:60%;background:radial-gradient(ellipse,var(--glow2) 0%,transparent 70%);pointer-events:none;z-index:0;transition:background .5s}
    #root{position:relative;z-index:1}
    /* === Tablet (900px) === */
    @media(max-width:900px){
      .grid-2col{grid-template-columns:1fr!important}
      .grid-index{grid-template-columns:repeat(3,1fr)!important}
      .grid-sector{grid-template-columns:repeat(2,1fr)!important}
      .header-wrap{padding:20px 16px 14px!important;flex-wrap:wrap!important}
      .main-wrap{padding:16px 16px 40px!important}
      .nav-wrap{padding:22px 16px 14px!important;margin-top:-22px!important;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
      .nav-wrap::-webkit-scrollbar{display:none}
      .nav-btn{padding:12px 16px!important;min-height:44px!important}
      .stock-row{font-size:13px!important}
      .search-wrap{width:100%!important;margin-bottom:12px!important}
      .search-wrap input{width:100%!important}
      .theme-dropdown{min-width:0!important;max-width:calc(100vw - 32px)!important}
      .card-pad{padding:16px 18px!important}
    }
    /* === Phone (600px) === */
    @media(max-width:600px){
      /* Header: 세로 스택 */
      .header-wrap{padding:14px 16px 10px!important;flex-direction:column!important;align-items:flex-start!important;gap:4px!important}
      .header-title{font-size:23px!important}
      .header-subtitle{display:none!important}
      .header-right{width:100%!important;display:flex!important;justify-content:space-between!important;align-items:center!important}
      .header-date{font-size:13px!important}
      .header-time-large{font-size:18px!important}
      /* Nav: 가로 스크롤 + 라벨 항상 표시 */
      .nav-wrap{gap:4px!important;padding:22px 16px 12px!important;margin-top:-22px!important;overflow-x:auto!important;flex-wrap:nowrap!important}
      .nav-btn{padding:10px 14px!important;font-size:14px!important;min-height:44px!important;white-space:nowrap!important;flex-shrink:0!important}
      .nav-btn-icon{font-size:13px!important}
      /* Index: 2열 + 카드 패딩 축소 */
      .grid-index{grid-template-columns:1fr 1fr!important;gap:6px!important}
      .grid-index .fade-up{padding:0!important}
      .grid-index a>div{padding:12px!important;border-radius:10px!important}
      .idx-value{font-size:16px!important}
      .idx-label{font-size:11px!important}
      .grid-sector{grid-template-columns:1fr!important}
      /* Stock table: 모바일 카드 레이아웃 */
      .stock-row{display:grid!important;grid-template-columns:32px 1fr auto!important;grid-template-rows:auto auto auto auto!important;padding:12px 16px!important;gap:2px 10px!important;font-size:15px!important;align-items:center!important}
      .stock-row.stock-row-header{display:none!important}
      .stock-col-rank{grid-row:1/3;align-self:center}
      .stock-col-name{grid-column:2;grid-row:1;font-size:15px!important;font-weight:600!important;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
      .stock-col-change{grid-column:3;grid-row:1;text-align:right!important;font-size:14px!important;white-space:nowrap}
      .stock-col-price{grid-column:2;grid-row:2;font-size:13px!important;font-weight:500!important;text-align:left!important;color:var(--text-sub)!important}
      .stock-col-volume{grid-column:3;grid-row:2;text-align:right!important;font-size:12px!important;color:var(--muted)}
      .stock-col-reason{grid-column:1/4;grid-row:3;font-size:12px!important;padding-left:0!important;margin-top:4px;line-height:1.4!important}
      .stock-col-tags{grid-column:1/4;grid-row:4;margin-top:4px}
      .stock-detail{padding:12px 16px!important}
      .stock-detail .stock-3axis{grid-template-columns:1fr!important}
      .stock-detail .stock-investor>div{min-width:0!important;flex:1!important}
      .card-pad{padding:14px!important}
      /* Theme */
      .theme-layout{flex-wrap:wrap!important;gap:10px!important}
      .theme-right{width:100%!important;flex-direction:row!important;justify-content:flex-start!important;gap:16px!important}
      .theme-pct{font-size:18px!important}
      /* News, AI, Footer */
      .ai-section{padding:14px 16px!important}
      .news-filter-btn{padding:8px 12px!important;font-size:13px!important;min-height:40px!important}
      .sector-stock-row{padding:12px 0!important}
      footer{flex-direction:column!important;text-align:center!important;padding:18px 16px!important}
    }
    /* === Small phone (400px) === */
    @media(max-width:400px){
      .header-title{font-size:21px!important}
      .header-time-large{font-size:16px!important}
      .idx-value{font-size:15px!important}
      .theme-pct{font-size:16px!important}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo,useRef,useCallback}=React;

// ═══ SUPABASE CONFIG ═══
const SB_URL="https://mmmpqmvwpuxqyxlxytsh.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tbXBxbXZ3cHV4cXl4bHh5dHNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NTI5ODQsImV4cCI6MjA4NzMyODk4NH0.KsXLXL6g-WeodZ-wYOCJnZBkUWMZ-F06Tq4XBUQsKaA";

async function db(table,params=""){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}});
    if(!r.ok)throw new Error(r.status);
    return await r.json();
  }catch(e){console.error(`DB error(${table}):`,e);return null;}
}

// ═══ FALLBACK ═══
const FB_IDX=[
  {name:"코스피",value:"—",change_amount:"",change_pct:"—",trend:"up"},
  {name:"코스닥",value:"—",change_amount:"",change_pct:"—",trend:"up"},
  {name:"다우존스",value:"—",change_amount:"",change_pct:"—",trend:"up"},
  {name:"나스닥",value:"—",change_amount:"",change_pct:"—",trend:"up"},
  {name:"S&P 500",value:"—",change_amount:"",change_pct:"—",trend:"up"},
  {name:"USD/KRW",value:"—",change_amount:"",change_pct:"—",trend:"up"},
];

// ═══ COMPONENTS ═══
function Sparkline({trend,data,w=56,h=26}){
  const c=trend==="up"?"#22c55e":trend==="down"?"#ef4444":"#6b7280";
  const p=useMemo(()=>{if(data&&data.length>=2){const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1,pad=2;return data.map((v,i)=>`${(i/(data.length-1))*w},${h-pad-((v-mn)/rng)*(h-pad*2)}`).join(" ")}if(data&&data.length===1)return `0,${h/2} ${w},${h/2}`;const s=trend==="up"?h*.7:h*.3,e=trend==="up"?h*.3:h*.7,m=(s+e)/2+(trend==="up"?2:-2);return `0,${s} ${w*.3},${(s*2+m)/3} ${w*.5},${m} ${w*.7},${(e*2+m)/3} ${w},${e}`},[trend,data,w,h]);
  return <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{overflow:"visible"}}><polyline points={p} fill="none" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" opacity={data&&data.length>=2?1:0.4}/></svg>;
}
function MiniBar({trend}){
  const c=trend==="up"?"34,197,94":"239,68,68";
  const b=useMemo(()=>Array.from({length:14},(_,i)=>{const v=trend==="up"?8+i*1.5:28-i*1.2;return Math.max(4,Math.min(36,v+(Math.random()-.5)*10))}),[trend]);
  return <div style={{display:"flex",alignItems:"flex-end",gap:"2px",height:"44px"}}>{b.map((h,i)=><div key={i} style={{flex:1,height:`${h}px`,borderRadius:"2px",background:`rgba(${c},${.15+(i/14)*.5})`,transition:"height .4s",transitionDelay:`${i*30}ms`}}/>)}</div>;
}
function Dot({s,size=8}){const c={positive:"#22c55e",negative:"#ef4444",neutral:"#6b7280"}[s]||"#6b7280";return <span style={{display:"inline-block",width:size,height:size,borderRadius:"50%",background:c,boxShadow:`0 0 ${size}px ${c}44`,flexShrink:0}}/>;}
function Tag({children,color="purple"}){const m={purple:{b:"rgba(139,92,246,0.12)",t:"#a78bfa"},blue:{b:"rgba(59,130,246,0.12)",t:"#60a5fa"},cyan:{b:"rgba(6,182,212,0.12)",t:"#22d3ee"}}[color]||{b:"rgba(139,92,246,0.12)",t:"#a78bfa"};return <span style={{display:"inline-block",padding:"2px 8px",background:m.b,color:m.t,borderRadius:"4px",fontSize:"12px",fontWeight:600}}>{children}</span>;}
function Box({children,style:s={},hover=true,onClick,className:cn}){const[h,setH]=useState(false);return <div className={cn} onClick={onClick} onMouseEnter={()=>hover&&setH(true)} onMouseLeave={()=>hover&&setH(false)} style={{background:h?"var(--card-hbg)":"var(--card-bg)",border:"1px solid",borderColor:h?"var(--card-hbd)":"var(--card-bd)",borderRadius:"14px",transition:"all .25s",transform:h?"translateY(-1px)":"none",cursor:onClick?"pointer":"default",...s}}>{children}</div>;}
function Loader(){return <div style={{display:"flex",justifyContent:"center",alignItems:"center",padding:"60px",gap:"12px"}}><div style={{width:20,height:20,border:"2px solid rgba(6,182,212,0.2)",borderTop:"2px solid #06b6d4",borderRadius:"50%",animation:"spin .8s linear infinite"}}/><span style={{color:"var(--muted)",fontSize:"15px"}}>데이터 로딩 중...</span></div>;}
function Empty({msg}){return <div style={{textAlign:"center",padding:"60px 20px",color:"var(--dim)"}}><div style={{fontSize:"36px",marginBottom:"12px"}}>📭</div><div style={{fontSize:"16px",lineHeight:1.6}}>{msg}</div><div style={{fontSize:"14px",marginTop:"8px",color:"var(--dimmer)"}}>GitHub Actions에서 크롤링을 실행하면 데이터가 채워집니다</div></div>;}

// ═══ NEWS ROW (호버 + 링크) ═══
function NewsRow({n,isLast}){
  const[h,setH]=useState(false);
  const inner=<div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{padding:"13px 4px",borderBottom:isLast?"none":"1px solid var(--div)",background:h?"rgba(59,130,246,0.06)":"transparent",borderRadius:h?"6px":"0",transition:"all .2s ease",cursor:n.url?"pointer":"default"}}>
    <div style={{display:"flex",gap:"10px",alignItems:"flex-start"}}><Dot s={n.sentiment} size={7}/><div style={{marginTop:"-2px"}}><div style={{fontSize:h?"14px":"13px",fontWeight:h?600:500,lineHeight:1.55,marginBottom:"5px",color:h?"#60a5fa":"inherit",transition:"all .2s ease"}}>{n.title}</div>
    <div style={{display:"flex",gap:"8px",alignItems:"center",color:"var(--muted)",fontSize:"13px"}}><span style={{fontWeight:500}}>{n.source}</span><span style={{opacity:.4}}>·</span><span>{n.time_ago}</span><Tag color="blue">{n.category}</Tag></div></div></div>
  </div>;
  if(n.url)return <a href={n.url} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none",color:"inherit",display:"block"}}>{inner}</a>;
  return inner;
}

// ═══ TAB: OVERVIEW ═══
function TabOverview({idx,stk,nws,sec,loading}){
  const[expSec,setExpSec]=useState(null);
  if(loading)return <Loader/>;
  return <div>
    <div className="grid-index" style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(idx.length||3,6)},1fr)`,gap:"10px",marginBottom:"28px"}}>
      {idx.map((m,i)=>{const urls={"코스피":"https://finance.naver.com/sise/sise_index.naver?code=KOSPI","코스닥":"https://finance.naver.com/sise/sise_index.naver?code=KOSDAQ","다우존스":"https://finance.naver.com/world/sise.naver?symbol=DJI@DJI","나스닥":"https://finance.naver.com/world/sise.naver?symbol=NAS@IXIC","S&P 500":"https://finance.naver.com/world/sise.naver?symbol=SPI@SPX","USD/KRW":"https://investing.com/currencies/usd-krw"};const url=urls[m.name];return <a key={m.name} href={url||"#"} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none",color:"inherit"}}><Box style={{padding:"18px"}}><div className={`fade-up fade-up-d${Math.min(i+1,4)}`}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}}><span className="idx-label" style={{color:"var(--muted)",fontSize:"13px",fontWeight:500}}>{m.name}</span><Sparkline trend={m.trend} data={(m.sparkline_data&&m.sparkline_data.v)||m.sparkline_data} w={44} h={20}/></div>
        <div className="idx-value" style={{fontSize:"20px",fontWeight:700,marginBottom:"2px",fontVariantNumeric:"tabular-nums"}}>{m.value}</div>
        <div style={{display:"flex",gap:"8px",alignItems:"baseline"}}><span style={{color:m.trend==="up"?"#22c55e":(m.trend==="down"?"#ef4444":"#6b7280"),fontSize:"15px",fontWeight:600}}>{m.trend==="up"?"▲":(m.trend==="down"?"▼":"─")} {m.change_pct}</span><span style={{color:"var(--dim)",fontSize:"13px"}}>{m.change_amount}</span></div>
      </div></Box></a>})}
    </div>
    <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginBottom:"16px"}}>
      <Box className="card-pad" style={{padding:"22px 24px"}} hover={false}><div className="fade-up fade-up-d2">
        <h3 style={{fontSize:"17px",fontWeight:700,marginBottom:"18px",display:"flex",alignItems:"center",gap:"8px"}}><span style={{width:24,height:24,borderRadius:"6px",display:"inline-flex",alignItems:"center",justifyContent:"center",background:"rgba(245,158,11,0.12)",color:"#f59e0b",fontSize:"13px"}}>◆</span>이슈 종목 TOP 5</h3>
        {stk.length===0?<Empty msg="이슈 종목 데이터 없음"/>:stk.slice(0,5).map((s,i)=><div key={s.code||i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 0",borderBottom:i<4?"1px solid var(--div)":"none"}}>
          <div style={{display:"flex",alignItems:"center",gap:"12px"}}><span style={{width:26,height:26,borderRadius:"7px",fontSize:"13px",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",background:i<3?"rgba(245,158,11,0.12)":"var(--badge-bg)",color:i<3?"#f59e0b":"var(--muted)"}}>{s.rank}</span>
          <div><div style={{fontWeight:600,fontSize:"16px"}}>{s.name}<span style={{color:"var(--dim)",fontSize:"13px",marginLeft:"6px",fontWeight:400}}>{s.code}</span></div><div style={{color:"var(--muted)",fontSize:"13px",marginTop:"2px"}}>{s.reason}</div></div></div>
          <div style={{textAlign:"right"}}><div style={{fontWeight:600,fontSize:"16px",fontVariantNumeric:"tabular-nums"}}>₩{s.price}</div><div style={{color:s.trend==="up"?"#22c55e":(s.trend==="down"?"#ef4444":"#6b7280"),fontSize:"14px",fontWeight:600}}>{s.trend==="up"?"▲":(s.trend==="down"?"▼":"─")} {s.change_pct}</div></div>
        </div>)}
      </div></Box>
      <Box className="card-pad" style={{padding:"22px 24px"}} hover={false}><div className="fade-up fade-up-d3">
        <h3 style={{fontSize:"17px",fontWeight:700,marginBottom:"18px",display:"flex",alignItems:"center",gap:"8px"}}><span style={{width:24,height:24,borderRadius:"6px",display:"inline-flex",alignItems:"center",justifyContent:"center",background:"rgba(59,130,246,0.12)",color:"#3b82f6",fontSize:"13px"}}>◇</span>최신 주요 뉴스</h3>
        {nws.length===0?<Empty msg="뉴스 데이터 없음"/>:nws.slice(0,5).map((n,i)=><NewsRow key={n.id||i} n={n} isLast={i===4||i===nws.slice(0,5).length-1}/>)}
      </div></Box>
    </div>
    {sec.length>0&&<Box className="card-pad" style={{padding:"22px 24px"}} hover={false}><div className="fade-up fade-up-d4">
      <h3 style={{fontSize:"17px",fontWeight:700,marginBottom:"16px",display:"flex",alignItems:"center",gap:"8px"}}><span style={{width:24,height:24,borderRadius:"6px",display:"inline-flex",alignItems:"center",justifyContent:"center",background:"rgba(139,92,246,0.12)",color:"#8b5cf6",fontSize:"13px"}}>▣</span>섹터별 등락</h3>
      <div className="grid-sector" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"10px"}}>{sec.map(s=>{const u=s.trend==="up";const isExp=expSec===s.name;return <SectorCard key={s.name} s={s} u={u} isExp={isExp} onClick={()=>setExpSec(isExp?null:s.name)}/>})}</div>
    </div></Box>}
  </div>;
}

// ═══ TAB: STOCKS ═══
function TabStocks({stk,nws,loading}){
  const[q,setQ]=useState("");const[hov,setHov]=useState(null);const[exp,setExp]=useState(null);
  if(loading)return <Loader/>;if(!stk.length)return <Empty msg="이슈 종목 데이터 없음"/>;
  const f=q?stk.filter(s=>s.name.includes(q)||s.code.includes(q)||(s.tags||[]).some(t=>t.includes(q))):stk;
  const getRelatedNews=(stock)=>{
    // 1) crawl.py에서 수집한 related_news 사용
    if(stock.related_news){
      try{
        const parsed=typeof stock.related_news==='string'?JSON.parse(stock.related_news):stock.related_news;
        if(parsed&&parsed.length)return parsed;
      }catch(e){}
    }
    // 2) fallback: 일반 뉴스에서 종목명 매칭
    const name=stock.name;
    if(!nws||!nws.length||!name||name.length<2)return[];
    return nws.filter(n=>n.title&&n.title.includes(name)).slice(0,5);
  };
  return <div className="fade-up">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"18px",flexWrap:"wrap",gap:"12px"}}>
      <h2 style={{fontSize:"20px",fontWeight:700}}><span style={{color:"#f59e0b"}}>◆</span> 오늘의 이슈 종목 <span style={{fontSize:"14px",color:"var(--dim)",fontWeight:400}}>{f.length}종목</span></h2>
      <div className="search-wrap" style={{position:"relative"}}><input value={q} onChange={e=>setQ(e.target.value)} placeholder="종목명, 코드, 테마 검색" style={{background:"var(--inp-bg)",border:"1px solid var(--inp-bd)",borderRadius:"8px",padding:"10px 14px 10px 34px",color:"var(--text)",fontSize:"15px",width:240,outline:"none",fontFamily:"inherit"}}/><span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:"var(--dim)",fontSize:"15px"}}>⌕</span></div>
    </div>
    <Box style={{overflow:"hidden"}} hover={false}>
      <div className="stock-row stock-row-header" style={{display:"grid",gridTemplateColumns:"44px 1.2fr 110px 90px 120px 1.5fr 100px",padding:"13px 20px",background:"var(--row-head)",borderBottom:"1px solid var(--div3)",fontSize:"13px",color:"var(--muted)",fontWeight:600}}><span>#</span><span>종목</span><span style={{textAlign:"right"}}>현재가</span><span style={{textAlign:"right"}}>등락률</span><span style={{textAlign:"right"}}>거래대금</span><span style={{paddingLeft:"16px"}}>이슈 사유</span><span>테마</span></div>
      {f.map((s,i)=>{const related=exp===s.code?getRelatedNews(s):[];return <React.Fragment key={s.code||i}>
        <div onClick={()=>setExp(exp===s.code?null:s.code)} onMouseEnter={()=>setHov(s.code)} onMouseLeave={()=>setHov(null)} className="stock-row" style={{display:"grid",gridTemplateColumns:"44px 1.2fr 110px 90px 120px 1.5fr 100px",padding:"15px 20px",borderBottom:exp===s.code?"none":"1px solid var(--div)",background:hov===s.code?"var(--hover)":"transparent",cursor:"pointer",alignItems:"center",transition:"background .15s"}}>
          <span className="stock-col-rank" style={{width:28,height:28,borderRadius:"7px",fontSize:"13px",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",background:s.rank<=3?"rgba(245,158,11,0.14)":"var(--badge-bg2)",color:s.rank<=3?"#f59e0b":"var(--muted)"}}>{s.rank}</span>
          <div className="stock-col-name"><span style={{fontWeight:600,fontSize:"16px"}}>{s.name}</span><span style={{color:"var(--dim)",fontSize:"13px",marginLeft:"6px"}}>{s.code}</span></div>
          <span className="stock-col-price" style={{textAlign:"right",fontWeight:600,fontVariantNumeric:"tabular-nums"}}>₩{s.price}</span>
          <span className="stock-col-change" style={{textAlign:"right",fontWeight:700,fontSize:"15px",color:s.trend==="up"?"#22c55e":(s.trend==="down"?"#ef4444":"#6b7280")}}>{s.trend==="up"?"▲":(s.trend==="down"?"▼":"─")} {s.change_pct}</span>
          <span className="stock-col-volume" style={{textAlign:"right",color:"var(--muted)",fontSize:"14px",fontVariantNumeric:"tabular-nums"}}>{s.volume}</span>
          <span className="stock-col-reason" style={{paddingLeft:"16px",color:"var(--text-sub)",fontSize:"14px",lineHeight:1.4}}>{s.reason}</span>
          <div className="stock-col-tags" style={{display:"flex",gap:"4px",flexWrap:"wrap",alignItems:"center"}}>{(s.tags||[]).map(t=><Tag key={t}>{t}</Tag>)}<span style={{color:"var(--dimmer)",fontSize:"16px",marginLeft:"auto",transform:exp===s.code?"rotate(90deg)":"none",transition:"transform .2s"}}>›</span></div>
        </div>
        {exp===s.code&&(()=>{
          // 3축 분석 계산
          const reasons=(s.reason||"").split(" · ");
          const newsCount=related.length;
          const hasTags=(s.tags||[]).length>0;
          const hasTheme=reasons.includes("인기테마");
          const hasNewsReason=reasons.includes("뉴스언급");
          const hasTradeBoom=reasons.includes("거래폭발");
          const pctNum=parseFloat((s.change_pct||"0").replace(/[+%]/g,""));
          const isLimit=reasons.includes("상한가")||reasons.includes("하한가");
          const isSurge=reasons.includes("급등");
          const isPlunge=reasons.includes("급락");
          // 재료 강도
          const catalystScore=(newsCount>=3?2:newsCount>=1?1:0)+(hasTheme?1:0)+(hasNewsReason?1:0);
          const catalystRating=catalystScore>=3?"strong":catalystScore>=1?"moderate":"weak";
          const catalystLabel={strong:"재료 풍부",moderate:"재료 보통",weak:"재료 부족"}[catalystRating];
          const catalystColor={strong:"#22c55e",moderate:"#f59e0b",weak:"#6b7280"}[catalystRating];
          // 수급 강도 (외국인/기관 실제 데이터 반영)
          const fNet=s.foreign_net||0;
          const iNet=s.institution_net||0;
          const supplyScore=(fNet>0?2:fNet<0?-1:0)+(iNet>0?1:iNet<0?-1:0)+(hasTradeBoom?1:0)+(hasTheme?1:0);
          const supplyRating=supplyScore>=3?"strong":supplyScore>=1?"moderate":"weak";
          const supplyLabel={strong:"수급 강",moderate:"수급 보통",weak:"수급 약"}[supplyRating];
          const supplyColor={strong:"#22c55e",moderate:"#f59e0b",weak:"#6b7280"}[supplyRating];
          // 모멘텀 강도
          const momScore=(isLimit?3:isSurge||isPlunge?2:Math.abs(pctNum)>=3?1:0);
          const momRating=momScore>=3?"strong":momScore>=1?"moderate":"weak";
          const momDir=pctNum>=0?"상승":"하락";
          const momLabel={strong:`강한 ${momDir}`,moderate:`${momDir}`,weak:"약보합"}[momRating];
          const momColor=pctNum>=0?{strong:"#22c55e",moderate:"#22c55e",weak:"#6b7280"}[momRating]:{strong:"#ef4444",moderate:"#ef4444",weak:"#6b7280"}[momRating];
          // 상세 텍스트
          const catalystDetail=[newsCount>0?`관련 뉴스 ${newsCount}건`:"뉴스 없음",hasTags?(s.tags||[]).slice(0,2).join(", ")+" 소속":"테마 미분류",hasNewsReason?"뉴스 다수 언급":""].filter(Boolean).join(" · ");
          const fNetStr=fNet!==0?(fNet>0?`외인 +${Math.abs(fNet).toLocaleString()}억`:`외인 ${fNet.toLocaleString()}억`):"";
          const iNetStr=iNet!==0?(iNet>0?`기관 +${Math.abs(iNet).toLocaleString()}억`:`기관 ${iNet.toLocaleString()}억`):"";
          const supplyDetail=[fNetStr,iNetStr,hasTradeBoom?"거래폭발":""].filter(Boolean).join(" · ")||(hasTradeBoom?"거래대금 폭발":"거래대금 "+s.volume);
          const momDetail=[s.change_pct,isLimit?"가격제한폭 도달":isSurge?"급등세":isPlunge?"급락세":"",s.rank<=5?"이슈 상위권":""].filter(Boolean).join(" · ");
          return <div className="stock-detail" style={{padding:"18px 20px 18px 76px",background:"var(--hover2)",borderBottom:"1px solid var(--div3)",animation:"fadeUp .3s ease both"}}>
          <div style={{display:"flex",gap:"24px",marginBottom:"16px",flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:120}}><div style={{color:"var(--muted)",fontSize:"13px",fontWeight:600,marginBottom:"8px"}}>📌 이슈 사유</div><div>{reasons.map((r,ri)=><span key={ri} style={{display:"inline-block",padding:"4px 10px",background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.15)",borderRadius:"6px",fontSize:"14px",marginRight:"6px",marginBottom:"4px",color:"#f59e0b",fontWeight:500}}>{r}</span>)}</div></div>
            <div><div style={{color:"var(--muted)",fontSize:"13px",fontWeight:600,marginBottom:"8px"}}>🏷️ 테마</div><div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>{(s.tags||[]).map(t=><Tag key={t} color="cyan">{t}</Tag>)}</div></div>
            <div style={{textAlign:"right"}}><div style={{color:"var(--muted)",fontSize:"13px",fontWeight:600,marginBottom:"8px"}}>💰 거래대금</div><div style={{fontSize:"16px",fontWeight:700,color:"var(--text)"}}>{s.volume}</div></div>
          </div>
          {(fNet!==0||iNet!==0)&&<div className="stock-investor" style={{display:"flex",gap:"12px",marginBottom:"16px",flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:100,padding:"10px 14px",background:"var(--card)",borderRadius:"8px",border:"1px solid var(--div3)"}}>
              <div style={{color:"var(--muted)",fontSize:"12px",marginBottom:"4px"}}>🌍 외국인</div>
              <div style={{fontSize:"15px",fontWeight:700,color:fNet>0?"#22c55e":fNet<0?"#ef4444":"var(--dim)"}}>{fNet>0?"+":""}{fNet.toLocaleString()}억</div>
              {s.foreign_ratio>0&&<div style={{fontSize:"11px",color:"var(--muted)",marginTop:"2px"}}>보유 {s.foreign_ratio}%</div>}
            </div>
            <div style={{flex:1,minWidth:100,padding:"10px 14px",background:"var(--card)",borderRadius:"8px",border:"1px solid var(--div3)"}}>
              <div style={{color:"var(--muted)",fontSize:"12px",marginBottom:"4px"}}>🏛️ 기관</div>
              <div style={{fontSize:"15px",fontWeight:700,color:iNet>0?"#22c55e":iNet<0?"#ef4444":"var(--dim)"}}>{iNet>0?"+":""}{iNet.toLocaleString()}억</div>
            </div>
            <div style={{flex:1,minWidth:100,padding:"10px 14px",background:"var(--card)",borderRadius:"8px",border:"1px solid var(--div3)"}}>
              <div style={{color:"var(--muted)",fontSize:"12px",marginBottom:"4px"}}>👤 개인</div>
              <div style={{fontSize:"15px",fontWeight:700,color:(s.individual_net||0)>0?"#22c55e":(s.individual_net||0)<0?"#ef4444":"var(--dim)"}}>{(s.individual_net||0)>0?"+":""}{(s.individual_net||0).toLocaleString()}억</div>
            </div>
          </div>}
          {/* 3축 분석 카드 */}
          <div className="stock-3axis" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px",marginBottom:"16px"}}>{[
            {icon:"🔥",title:"재료",label:catalystLabel,color:catalystColor,detail:catalystDetail},
            {icon:"💰",title:"수급",label:supplyLabel,color:supplyColor,detail:supplyDetail},
            {icon:"🎯",title:"모멘텀",label:momLabel,color:momColor,detail:momDetail}
          ].map((ax,ai)=><div key={ai} style={{padding:"14px 16px",borderRadius:"10px",background:"var(--card-bg)",border:"1px solid var(--card-bd)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}}><span style={{fontSize:"14px",fontWeight:600,color:"var(--text)"}}>{ax.icon} {ax.title}</span><span style={{padding:"3px 10px",borderRadius:"12px",fontSize:"12px",fontWeight:700,color:ax.color,background:`${ax.color}18`,border:`1px solid ${ax.color}30`}}>{ax.label}</span></div>
            <div style={{fontSize:"13px",color:"var(--text-sub)",lineHeight:1.5}}>{ax.detail}</div>
          </div>)}</div>
          {related.length>0&&<div style={{marginBottom:"12px"}}><div style={{color:"var(--muted)",fontSize:"13px",fontWeight:600,marginBottom:"8px"}}>📰 관련 뉴스</div><div style={{display:"grid",gap:"6px"}}>{related.map((n,ni)=><a key={ni} href={n.link||n.url||"#"} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center",gap:"8px",padding:"8px 12px",background:"var(--card-bg)",border:"1px solid var(--div2)",borderRadius:"8px",textDecoration:"none",color:"inherit",transition:"all .2s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(59,130,246,0.3)";e.currentTarget.style.background="rgba(59,130,246,0.04)"}} onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--div2)";e.currentTarget.style.background="var(--card-bg)"}}><span style={{color:"#3b82f6",fontSize:"13px",flexShrink:0}}>▸</span><span style={{fontSize:"14px",lineHeight:1.5,color:"var(--text-sub)",flex:1}}>{n.title}</span><span style={{fontSize:"12px",color:"var(--dim)",flexShrink:0,whiteSpace:"nowrap"}}>{n.source} · {n.time_ago}</span></a>)}</div></div>}
          {related.length===0&&<div style={{display:"flex",alignItems:"center",gap:"6px",padding:"10px 12px",background:"var(--card-bg)",border:"1px solid var(--div2)",borderRadius:"8px",marginBottom:"12px"}}><span style={{fontSize:"13px",color:"var(--dim)"}}>📰</span><span style={{fontSize:"14px",color:"var(--dim)"}}>관련 뉴스가 없습니다</span><a href={`https://finance.naver.com/item/news.naver?code=${s.code}`} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{fontSize:"13px",color:"#3b82f6",textDecoration:"none",marginLeft:"auto"}}>네이버 뉴스 보기 →</a></div>}
          <a href={`https://finance.naver.com/item/main.naver?code=${s.code}`} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{display:"inline-flex",alignItems:"center",gap:"6px",padding:"8px 16px",borderRadius:"8px",background:"rgba(6,182,212,0.08)",border:"1px solid rgba(6,182,212,0.2)",color:"#06b6d4",fontSize:"14px",fontWeight:600,textDecoration:"none",transition:"all .2s"}} onMouseEnter={e=>{e.currentTarget.style.background="rgba(6,182,212,0.15)"}} onMouseLeave={e=>{e.currentTarget.style.background="rgba(6,182,212,0.08)"}}>네이버 증권 상세 →</a>
        </div>})()}
      </React.Fragment>})}
    </Box>
    <div style={{textAlign:"center",marginTop:"16px"}}><a href="analysis.html" style={{display:"inline-flex",alignItems:"center",gap:"8px",padding:"10px 20px",borderRadius:"10px",background:"rgba(6,182,212,0.08)",border:"1px solid rgba(6,182,212,0.15)",color:"#06b6d4",fontSize:"14px",fontWeight:600,textDecoration:"none",transition:"all .2s"}} onMouseEnter={e=>{e.currentTarget.style.background="rgba(6,182,212,0.15)"}} onMouseLeave={e=>{e.currentTarget.style.background="rgba(6,182,212,0.08)"}}>📊 상세 종목 리포트 보기 →</a></div>
  </div>;
}

// ═══ TAB: NEWS ═══
function TabNews({nws,loading}){
  const[fil,setFil]=useState("all");const[exp,setExp]=useState(null);
  if(loading)return <Loader/>;if(!nws.length)return <Empty msg="뉴스 데이터 없음"/>;
  const f=fil==="all"?nws:nws.filter(n=>n.sentiment===fil);
  const cnt={all:nws.length,positive:nws.filter(n=>n.sentiment==="positive").length,negative:nws.filter(n=>n.sentiment==="negative").length,neutral:nws.filter(n=>n.sentiment==="neutral").length};
  return <div className="fade-up">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"18px",flexWrap:"wrap",gap:"12px"}}>
      <h2 style={{fontSize:"20px",fontWeight:700}}><span style={{color:"#3b82f6"}}>◇</span> 주요 뉴스</h2>
      <div style={{display:"flex",gap:"5px"}}>{[{id:"all",l:"전체",c:null},{id:"positive",l:"호재",c:"#22c55e"},{id:"negative",l:"악재",c:"#ef4444"},{id:"neutral",l:"중립",c:"#6b7280"}].map(x=><button key={x.id} className="news-filter-btn" onClick={()=>setFil(x.id)} style={{padding:"7px 13px",fontFamily:"inherit",fontSize:"14px",fontWeight:500,background:fil===x.id?"var(--tab-bg)":"var(--hover)",border:"1px solid",cursor:"pointer",display:"flex",alignItems:"center",gap:"5px",borderColor:fil===x.id?"var(--tab-bd)":"transparent",borderRadius:"7px",color:fil===x.id?(x.c||"var(--text)"):"var(--muted)",transition:"all .2s"}}>{x.c&&<Dot s={x.id} size={6}/>}{x.l}<span style={{color:"var(--dim)",fontSize:"12px"}}>({cnt[x.id]})</span></button>)}</div>
    </div>
    <div style={{display:"grid",gap:"8px"}}>{f.map(n=><Box key={n.id} style={{padding:"20px 22px"}} onClick={()=>setExp(exp===n.id?null:n.id)}>
      <div style={{display:"flex",gap:"12px",alignItems:"flex-start"}}><div style={{paddingTop:"5px"}}><Dot s={n.sentiment} size={9}/></div><div style={{flex:1}}>
        <h4 style={{fontSize:"17px",fontWeight:600,lineHeight:1.5,marginBottom:"8px"}}>{n.title}</h4>
        <div style={{display:"flex",gap:"10px",alignItems:"center",flexWrap:"wrap"}}><span style={{color:"var(--text-sub)",fontSize:"14px",fontWeight:500}}>{n.source}</span><span style={{color:"var(--dimmer)"}}>·</span><span style={{color:"var(--muted)",fontSize:"14px"}}>{n.time_ago}</span><Tag color="blue">{n.category}</Tag></div>
        {exp===n.id&&n.summary&&<div onClick={e=>{e.stopPropagation();if(n.url)window.open(n.url,"_blank","noopener,noreferrer")}} style={{marginTop:"14px",padding:"14px 16px",background:"var(--card-bg)",borderRadius:"8px",border:"1px solid var(--div2)",fontSize:"15px",lineHeight:1.7,color:"var(--text-sub)",animation:"fadeUp .25s ease both",cursor:n.url?"pointer":"default",transition:"all .2s ease"}} onMouseEnter={e=>{if(n.url){e.currentTarget.style.borderColor="rgba(59,130,246,0.4)";e.currentTarget.style.background="rgba(59,130,246,0.04)"}}} onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--div2)";e.currentTarget.style.background="var(--card-bg)"}}>{n.summary}{n.url&&<div style={{marginTop:"10px",fontSize:"13px",color:"#60a5fa",fontWeight:500}}>기사 원문 보기 →</div>}</div>}
      </div><span style={{color:"var(--dimmer)",fontSize:"17px",flexShrink:0,marginTop:"2px",transform:exp===n.id?"rotate(90deg)":"none",transition:"transform .2s"}}>→</span></div>
    </Box>)}</div>
  </div>;
}

// ═══ TAB: SECTORS ═══
function SectorCard({s,u,isExp,onClick}){

}

function TabThemes({thm,allThm,thmAn,loading}){

const sbClient=window.supabase.createClient(SB_URL,SB_KEY);
const CHAT_NICK_COLORS=["#06b6d4","#8b5cf6","#f59e0b","#22c55e","#ec4899","#3b82f6","#ef4444","#14b8a6","#f97316","#a855f7","#6366f1","#10b981"];
function chatNickColor(n){let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return CHAT_NICK_COLORS[Math.abs(h)%CHAT_NICK_COLORS.length]}

function ChatPanel({open,onClose}){
  const[nick,setNick]=useState(()=>localStorage.getItem("sp-chat-nick")||"");
  const[nickInput,setNickInput]=useState("");
  const[msgs,setMsgs]=useState([]);
  const[input,setInput]=useState("");
  const[connected,setConnected]=useState(false);
  const[lastSent,setLastSent]=useState(0);
  const[userCount,setUserCount]=useState(0);
  const msgsRef=useRef(null);
  const inputRef=useRef(null);
  const MAX_LEN=300;

  const scrollBottom=useCallback(()=>{const el=msgsRef.current;if(el)el.scrollTop=el.scrollHeight},[]);

  // Load messages
  useEffect(()=>{
    if(!open||!nick)return;
    (async()=>{
      const d=await db("chat_messages","select=*&order=created_at.desc&limit=80");
      if(d)setMsgs(d.reverse());
      setTimeout(scrollBottom,100);
    })();
  },[open,nick]);

  // Realtime
  useEffect(()=>{
    if(!open||!nick)return;
    const ch=sbClient.channel('chat_panel')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'chat_messages'},(p)=>{
        setMsgs(prev=>[...prev,p.new]);
        setTimeout(scrollBottom,50);
      })
      .on('presence',{event:'sync'},()=>{setUserCount(Object.keys(ch.presenceState()).length)})
      .subscribe(async(s)=>{
        if(s==='SUBSCRIBED'){setConnected(true);await ch.track({nick,joined:new Date().toISOString()})}
        else setConnected(false);
      });
    return()=>{sbClient.removeChannel(ch)};
  },[open,nick]);

  // Focus input on open
  useEffect(()=>{if(open&&nick)setTimeout(()=>inputRef.current?.focus(),200)},[open,nick]);

  const sendMsg=async()=>{
    const txt=input.trim();if(!txt||txt.length>MAX_LEN)return;
    if(Date.now()-lastSent<1500)return;
    setLastSent(Date.now());setInput("");inputRef.current?.focus();
    try{await fetch(SB_URL+"/rest/v1/chat_messages",{method:"POST",headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,"Content-Type":"application/json",Prefer:"return=minimal"},body:JSON.stringify({nickname:nick,message:txt})})}catch(e){console.error("Chat send error:",e)}
  };

  const setNickname=()=>{
    const t=nickInput.trim();
    if(t.length<2||t.length>10)return;
    if(/[<>"'&]/.test(t))return;
    localStorage.setItem("sp-chat-nick",t);setNick(t);
  };

  const fmtTime=(ts)=>new Date(ts).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});

  // Group by date
  const grouped=useMemo(()=>{
    const r=[];let ld="";
    msgs.forEach(m=>{
      const d=new Date(m.created_at).toLocaleDateString("ko-KR",{month:"short",day:"numeric"});
      if(d!==ld){r.push({type:"date",date:d});ld=d}
      r.push({type:"msg",data:m});
    });return r;
  },[msgs]);

  if(!open)return null;

  return <div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",background:"var(--bg)",borderLeft:"1px solid var(--div2)"}}>
    {/* Header */}
    <div style={{padding:"12px 16px",borderBottom:"1px solid var(--div2)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
        <span style={{fontSize:"16px"}}>💬</span>
        <span style={{fontWeight:700,fontSize:"15px"}}>토론방</span>
        {connected&&<span style={{width:6,height:6,borderRadius:"50%",background:"#22c55e",animation:"pulse 2s infinite"}}/>}
        {userCount>0&&<span style={{fontSize:"11px",color:"var(--muted)"}}>👥 {userCount}</span>}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
        <a href="chat.html" target="_blank" rel="noopener" style={{fontSize:"11px",color:"var(--dim)",textDecoration:"none",padding:"3px 8px",borderRadius:"6px",border:"1px solid var(--div3)"}} title="새 창으로 열기">↗</a>
        <button onClick={onClose} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:"18px",padding:"2px 6px",lineHeight:1}}>✕</button>
      </div>
    </div>

    {!nick ? (
      /* Nickname input */
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
        <div style={{textAlign:"center",maxWidth:260,width:"100%"}}>
          <div style={{fontSize:"32px",marginBottom:"10px"}}>💬</div>
          <div style={{fontWeight:700,fontSize:"16px",marginBottom:"4px"}}>토론방 입장</div>
          <div style={{color:"var(--muted)",fontSize:"13px",marginBottom:"16px"}}>닉네임을 입력하세요</div>
          <input value={nickInput} onChange={e=>{setNickInput(e.target.value)}} onKeyDown={e=>e.key==="Enter"&&setNickname()} placeholder="닉네임 (2~10자)" maxLength={10} style={{width:"100%",padding:"10px 14px",borderRadius:"8px",border:"1px solid var(--inp-bd)",background:"var(--inp-bg)",color:"var(--text)",fontSize:"14px",outline:"none",marginBottom:"8px",fontFamily:"inherit"}}/>
          <button onClick={setNickname} style={{width:"100%",padding:"10px",borderRadius:"8px",border:"none",background:"linear-gradient(135deg,#06b6d4,#8b5cf6)",color:"#fff",fontSize:"14px",fontWeight:600,cursor:"pointer"}}>입장</button>
        </div>
      </div>
    ) : (<>
      {/* Nick bar */}
      <div style={{padding:"8px 16px",borderBottom:"1px solid var(--div)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
          <span style={{fontSize:"12px",fontWeight:600,color:chatNickColor(nick)}}>{nick}</span>
          <button onClick={()=>{localStorage.removeItem("sp-chat-nick");setNick("");setMsgs([])}} style={{background:"none",border:"1px solid var(--div3)",borderRadius:"4px",padding:"1px 6px",fontSize:"10px",color:"var(--muted)",cursor:"pointer"}}>변경</button>
        </div>
        <span style={{fontSize:"10px",color:"var(--dimmer)"}}>비방/욕설 금지</span>
      </div>

      {/* Messages */}
      <div ref={msgsRef} style={{flex:1,overflowY:"auto",padding:"12px 16px",display:"flex",flexDirection:"column",gap:"2px"}}>
        {msgs.length===0?(
          <div style={{textAlign:"center",padding:"40px 0",color:"var(--muted)"}}>
            <div style={{fontSize:"32px",marginBottom:"8px"}}>💬</div>
            <div style={{fontSize:"13px"}}>첫 메시지를 남겨보세요!</div>
          </div>
        ):(
          grouped.map((item,i)=>item.type==="date"?(
            <div key={"d"+i} style={{display:"flex",alignItems:"center",gap:"8px",margin:"10px 0 6px"}}>
              <div style={{flex:1,height:"1px",background:"var(--div2)"}}/>
              <span style={{fontSize:"10px",color:"var(--muted)"}}>{item.date}</span>
              <div style={{flex:1,height:"1px",background:"var(--div2)"}}/>
            </div>
          ):(()=>{
            const m=item.data,mine=m.nickname===nick;
            return <div key={m.id||i} style={{display:"flex",flexDirection:"column",alignItems:mine?"flex-end":"flex-start",marginBottom:"3px"}}>
              {!mine&&<span style={{fontSize:"11px",fontWeight:600,color:chatNickColor(m.nickname),marginBottom:"2px",marginLeft:"2px"}}>{m.nickname}</span>}
              <div style={{maxWidth:"85%",padding:"8px 12px",borderRadius:mine?"12px 12px 3px 12px":"12px 12px 12px 3px",background:mine?"linear-gradient(135deg,rgba(6,182,212,0.15),rgba(139,92,246,0.12))":"var(--card-bg)",border:"1px solid "+(mine?"rgba(6,182,212,0.2)":"var(--card-bd)"),fontSize:"13px",lineHeight:1.5,color:"var(--text)",wordBreak:"break-word",whiteSpace:"pre-wrap"}}>{m.message}</div>
              <span style={{fontSize:"10px",color:"var(--dimmer)",marginTop:"1px"}}>{fmtTime(m.created_at)}</span>
            </div>;
          })())
        )}
        <div/>
      </div>

      {/* Input */}
      <div style={{borderTop:"1px solid var(--div2)",padding:"10px 16px",display:"flex",gap:"8px",alignItems:"flex-end",flexShrink:0}}>
        <div style={{flex:1,position:"relative"}}>
          <textarea ref={inputRef} value={input} onChange={e=>setInput(e.target.value.slice(0,MAX_LEN))} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg()}}} placeholder="메시지 입력..." rows={1} style={{width:"100%",padding:"8px 12px",borderRadius:"10px",border:"1px solid var(--inp-bd)",background:"var(--inp-bg)",color:"var(--text)",fontSize:"13px",lineHeight:1.4,outline:"none",resize:"none",fontFamily:"inherit",minHeight:"36px",maxHeight:"80px"}} onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,80)+"px"}}/>
          {input.length>250&&<span style={{position:"absolute",right:8,bottom:4,fontSize:"10px",color:input.length>280?"#ef4444":"var(--dimmer)"}}>{input.length}/{MAX_LEN}</span>}
        </div>
        <button onClick={sendMsg} disabled={!input.trim()} style={{padding:"8px 14px",borderRadius:"10px",border:"none",background:input.trim()?"linear-gradient(135deg,#06b6d4,#8b5cf6)":"var(--tab-bg)",color:input.trim()?"#fff":"var(--dimmer)",fontSize:"13px",fontWeight:600,cursor:input.trim()?"pointer":"default",minHeight:"36px",whiteSpace:"nowrap"}}>전송</button>
      </div>
    </>)}
  </div>;
}

const Ticker=React.memo(function Ticker({idx}){
  const items=useMemo(()=>[...idx,...idx],[idx]);
  const trackRef=React.useRef(null);
  const wrapStyle=useMemo(()=>({background:"var(--ticker-bg)",borderBottom:"1px solid var(--div2)",padding:"9px 0",overflow:"hidden",position:"relative",transition:"background .3s"}),[]);
  const trackStyle=useMemo(()=>({display:"inline-flex",gap:"40px",whiteSpace:"nowrap",willChange:"transform",backfaceVisibility:"hidden"}),[]);
  useEffect(()=>{
    const el=trackRef.current;if(!el)return;
    let offset=0,aid;
    const tick=()=>{offset-=0.18;const hw=el.scrollWidth/2;if(Math.abs(offset)>=hw)offset+=hw;el.style.transform="translate3d("+offset+"px,0,0)";aid=requestAnimationFrame(tick)};
    aid=requestAnimationFrame(tick);return()=>cancelAnimationFrame(aid);
  },[items]);
  return <div style={wrapStyle}><div ref={trackRef} style={trackStyle}>{items.map((m,i)=><span key={i} style={{display:"inline-flex",alignItems:"center",gap:"7px",fontSize:"14px",paddingRight:"20px"}}><span style={{color:"var(--muted)",fontWeight:500}}>{m.name}</span><span style={{color:"var(--text)",fontWeight:600,fontVariantNumeric:"tabular-nums"}}>{m.value}</span><span style={{color:m.trend==="up"?"#22c55e":"#ef4444",fontWeight:600}}>{m.change_pct}</span></span>)}</div></div>;
});

      <div className="fade-up fade-up-d1 header-right" style={{display:"flex",alignItems:"center",gap:"12px"}}>
        <div><div className="header-date" style={{color:"var(--muted)",fontSize:"14px",textAlign:"right"}}>{time.toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"short"})}</div><div className="header-time-large" style={{color:"var(--text)",fontSize:"22px",fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{time.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</div></div>
        <button onClick={()=>setTheme(t=>t==="dark"?"light":"dark")} title={theme==="dark"?"라이트 모드로 전환":"다크 모드로 전환"} style={{width:38,height:38,borderRadius:"10px",border:"1px solid var(--card-bd)",background:"var(--card-bg)",cursor:"pointer",fontSize:"20px",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .25s",flexShrink:0}} onMouseEnter={e=>{e.currentTarget.style.background="var(--card-hbg)";e.currentTarget.style.borderColor="var(--card-hbd)";e.currentTarget.style.transform="translateY(-1px)"}} onMouseLeave={e=>{e.currentTarget.style.background="var(--card-bg)";e.currentTarget.style.borderColor="var(--card-bd)";e.currentTarget.style.transform="none"}}>{theme==="dark"?"☀️":"🌙"}</button>
      </div>
    </header>

    <nav className="nav-wrap" style={{maxWidth:1440,margin:"0 auto",padding:"0 40px 18px",display:"flex",gap:"3px",borderBottom:"1px solid var(--div2)",overflow:"visible"}}>{tabs.map(t=><button key={t.id} className="nav-btn" onClick={()=>setTab(t.id)} style={{padding:"9px 18px",fontFamily:"inherit",fontSize:"15px",fontWeight:tab===t.id?600:400,cursor:"pointer",background:tab===t.id?"var(--tab-bg)":"transparent",border:"1px solid",borderColor:tab===t.id?"var(--tab-bd)":"transparent",borderRadius:"8px",color:tab===t.id?"var(--text)":"var(--dim)",transition:"all .2s",display:"flex",alignItems:"center",gap:"5px",whiteSpace:"nowrap",position:t.live?"relative":"static"}}><span className="nav-btn-icon" style={{fontSize:"12px",opacity:tab===t.id?1:.6}}>{t.ic}</span><span className="nav-btn-label">{t.l}</span>{t.live&&<span style={{position:"absolute",top:"-20px",left:"6px",background:"linear-gradient(135deg, #ff6b6b, #ef4444, #dc2626)",color:"#fff",fontSize:"11px",fontWeight:800,padding:"3px 8px",borderRadius:"6px",letterSpacing:"0.5px",lineHeight:"14px",boxShadow:"0 2px 10px rgba(239,68,68,0.45), 0 0 20px rgba(239,68,68,0.2)",animation:"liveBounce 2s ease-in-out infinite",zIndex:10,pointerEvents:"none"}}><span style={{position:"absolute",bottom:"-4px",left:"14px",width:0,height:0,borderLeft:"5px solid transparent",borderRight:"5px solid transparent",borderTop:"5px solid #ef4444"}}/>LIVE</span>}</button>)}<button className="nav-btn" onClick={()=>setChatOpen(c=>!c)} style={{padding:"9px 18px",fontFamily:"inherit",fontSize:"15px",fontWeight:chatOpen?600:400,background:chatOpen?"rgba(6,182,212,0.1)":"transparent",border:"1px solid",borderColor:chatOpen?"rgba(6,182,212,0.25)":"transparent",borderRadius:"8px",color:chatOpen?"#06b6d4":"var(--dim)",transition:"all .2s",display:"flex",alignItems:"center",gap:"5px",whiteSpace:"nowrap",cursor:"pointer",marginLeft:"auto"}} onMouseEnter={e=>{if(!chatOpen){e.currentTarget.style.background="rgba(6,182,212,0.08)";e.currentTarget.style.borderColor="rgba(6,182,212,0.2)";e.currentTarget.style.color="#06b6d4"}}} onMouseLeave={e=>{if(!chatOpen){e.currentTarget.style.background="transparent";e.currentTarget.style.borderColor="transparent";e.currentTarget.style.color="var(--dim)"}}}><span style={{fontSize:"12px"}}>💬</span><span className="nav-btn-label">토론방</span></button></nav>

    <div style={{display:"flex",maxWidth:1440,margin:"0 auto",minHeight:"calc(100vh - 200px)"}}>
      <main className="main-wrap" style={{flex:1,minWidth:0,padding:"22px 40px 60px",transition:"all .3s ease"}}>
        {tab==="overview"&&<TabOverview idx={idx} stk={stk} nws={nws} sec={sec} loading={loading}/>}
        {tab==="issues"&&<TabStocks stk={stk} nws={nws} loading={loading}/>}
        {tab==="themes"&&<TabThemes thm={thm} allThm={allThm} thmAn={thmAn} loading={loading}/>}
        {tab==="news"&&<TabNews nws={nws} loading={loading}/>}
        {tab==="ai"&&<TabAI aiSum={aiSum} loading={loading}/>}
      </main>
      {chatOpen&&<div className="chat-side-panel" style={{width:380,flexShrink:0,height:"calc(100vh - 200px)",position:"sticky",top:0,animation:"fadeUp .3s ease both"}}><ChatPanel open={chatOpen} onClose={()=>setChatOpen(false)}/></div>}
    </div>

    <footer style={{borderTop:"1px solid var(--div2)",maxWidth:1440,margin:"0 auto",padding:"18px 40px",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:"8px",color:"var(--dimmer)",fontSize:"13px"}}>
      <div><span style={{fontWeight:600,color:"var(--dim)"}}>STOCKPULSE</span> © 2026 · 투자 권유 목적이 아닌 정보 제공 목적</div>
      <div className="footer-links">
        <a href="chat.html">실시간 토론방</a>
        <a href="archive.html">AI 브리핑 아카이브</a>
        <a href="analysis.html">종목 리포트</a>
        <a href="guide.html">투자 가이드</a>
        <a href="about.html">서비스 소개</a>
        <a href="privacy.html">개인정보처리방침</a>
        <a href="terms.html">이용약관</a>
      </div>
    </footer>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
