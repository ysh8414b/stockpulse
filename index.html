<html lang="ko">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    :root{
      --bg:#07070c;--text:#e0ded8;--text-sub:#b0b0b0;--muted:#6b7280;--dim:#555;--dimmer:#444;
      --card-bg:rgba(255,255,255,0.02);--card-bd:rgba(255,255,255,0.06);
      --card-hbg:rgba(255,255,255,0.035);--card-hbd:rgba(255,255,255,0.1);
      --div:rgba(255,255,255,0.04);--div2:rgba(255,255,255,0.05);--div3:rgba(255,255,255,0.06);
      --inp-bg:rgba(255,255,255,0.05);--inp-bd:rgba(255,255,255,0.1);
      --tab-bg:rgba(255,255,255,0.07);--tab-bd:rgba(255,255,255,0.1);
      --ticker-bg:linear-gradient(90deg,#0a0a12,#0e0e1a,#0a0a12);
      --hover:rgba(255,255,255,0.03);--hover2:rgba(255,255,255,0.015);
      --badge-bg:rgba(255,255,255,0.05);--badge-bg2:rgba(255,255,255,0.04);
      --h-grad:linear-gradient(135deg,#e0ded8 30%,#888 100%);
      --glow1:rgba(6,182,212,0.03);--glow2:rgba(139,92,246,0.025);
      --skel1:rgba(255,255,255,0.04);--skel2:rgba(255,255,255,0.08);
      --scroll-thumb:rgba(255,255,255,0.1);
      --row-head:rgba(255,255,255,0.025);
    }
    .light{
      --bg:#f5f5f7;--text:#1a1a2e;--text-sub:#444;--muted:#6b7280;--dim:#9ca3af;--dimmer:#b0b0b0;
      --card-bg:#ffffff;--card-bd:rgba(0,0,0,0.08);
      --card-hbg:rgba(0,0,0,0.03);--card-hbd:rgba(0,0,0,0.15);
      --div:rgba(0,0,0,0.06);--div2:rgba(0,0,0,0.08);--div3:rgba(0,0,0,0.1);
      --inp-bg:rgba(0,0,0,0.03);--inp-bd:rgba(0,0,0,0.12);
      --tab-bg:rgba(0,0,0,0.06);--tab-bd:rgba(0,0,0,0.12);
      --ticker-bg:linear-gradient(90deg,#e8e8f0,#eff0f5,#e8e8f0);
      --hover:rgba(0,0,0,0.03);--hover2:rgba(0,0,0,0.015);
      --badge-bg:rgba(0,0,0,0.05);--badge-bg2:rgba(0,0,0,0.04);
      --h-grad:linear-gradient(135deg,#1a1a2e 30%,#555 100%);
      --glow1:transparent;--glow2:transparent;
      --skel1:rgba(0,0,0,0.04);--skel2:rgba(0,0,0,0.08);
      --scroll-thumb:rgba(0,0,0,0.15);
      --row-head:rgba(0,0,0,0.03);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .3s,color .3s}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:3px}
    ::selection{background:rgba(6,182,212,0.3)}
    @keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
    @keyframes liveBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(6,182,212,0.2)}50%{box-shadow:0 0 20px rgba(6,182,212,0.4)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .fade-up{animation:fadeUp .55s cubic-bezier(.16,1,.3,1) both}
    .fade-up-d1{animation-delay:.05s}.fade-up-d2{animation-delay:.1s}.fade-up-d3{animation-delay:.15s}.fade-up-d4{animation-delay:.2s}
    .skeleton{background:linear-gradient(90deg,var(--skel1) 25%,var(--skel2) 50%,var(--skel1) 75%);background-size:200% 100%;animation:shimmer 1.8s infinite;border-radius:6px}
    body::before{content:'';position:fixed;top:-40%;left:-20%;width:80%;height:80%;background:radial-gradient(ellipse,var(--glow1) 0%,transparent 70%);pointer-events:none;z-index:0;transition:background .5s}
    body::after{content:'';position:fixed;bottom:-30%;right:-15%;width:60%;height:60%;background:radial-gradient(ellipse,var(--glow2) 0%,transparent 70%);pointer-events:none;z-index:0;transition:background .5s}
    #root{position:relative;z-index:1}
    /* === Tablet (900px) === */
    @media(max-width:900px){
      .grid-2col{grid-template-columns:1fr!important}
      .grid-index{grid-template-columns:repeat(3,1fr)!important}

      .main-wrap{padding:16px 16px 40px!important}
      .nav-wrap{padding:0 16px 14px!important;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
      .nav-wrap::-webkit-scrollbar{display:none}
      .nav-btn{padding:12px 16px!important;min-height:44px!important}
      .stock-row{font-size:12px!important}
      .search-wrap{width:100%!important;margin-bottom:12px!important}
      .search-wrap input{width:100%!important}
      .theme-dropdown{min-width:0!important;max-width:calc(100vw - 32px)!important}
      .card-pad{padding:16px 18px!important}

    /* === Phone (600px) === */
    @media(max-width:600px){

      .header-wrap{padding:14px 16px 10px!important}
      .header-title{font-size:20px!important}
      .header-subtitle{display:none!important}
      .header-time-large{font-size:16px!important}
      .nav-wrap{gap:2px!important;padding:0 12px 12px!important}
      .nav-btn{padding:10px 12px!important;font-size:12px!important;min-height:44px!important}
      .stock-row{display:flex!important;flex-wrap:wrap!important;padding:14px 16px!important;gap:4px 8px!important;font-size:13px!important}
      .stock-row.stock-row-header{display:none!important}
      .stock-col-rank{order:0;flex-shrink:0;min-width:28px}
      .stock-col-name{order:1;flex:1;min-width:0;font-size:14px!important;font-weight:600!important}
      .stock-col-price{order:2;text-align:right!important;flex-shrink:0;font-size:14px!important;font-weight:700!important}
      .stock-col-change{order:3;margin-left:36px}
      .stock-col-volume{order:4;margin-left:auto;font-size:11px!important;color:var(--muted)}
      .stock-col-reason{order:5;width:100%!important;font-size:11px!important;padding-left:0!important;margin-top:2px}
      .stock-col-tags{order:6;width:100%!important;margin-top:4px}

      .card-pad{padding:14px!important}
      .idx-value{font-size:16px!important}
      .idx-label{font-size:10px!important}
      .theme-layout{flex-wrap:wrap!important;gap:10px!important}
      .theme-right{width:100%!important;flex-direction:row!important;justify-content:flex-start!important;gap:16px!important}
      .theme-pct{font-size:16px!important}
      .ai-section{padding:14px 16px!important}
      .news-filter-btn{padding:8px 12px!important;font-size:11px!important;min-height:40px!important}
      .sector-stock-row{padding:12px 0!important}
      footer{flex-direction:column!important;text-align:center!important;padding:18px 16px!important}

      .nav-btn-icon{font-size:14px!important}
      .header-title{font-size:18px!important}
      .header-time-large{font-size:14px!important}
      .theme-pct{font-size:14px!important}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo}=React;

// ═══ SUPABASE CONFIG ═══
const SB_URL="https://mmmpqmvwpuxqyxlxytsh.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tbXBxbXZ3cHV4cXl4bHh5dHNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NTI5ODQsImV4cCI6MjA4NzMyODk4NH0.KsXLXL6g-WeodZ-wYOCJnZBkUWMZ-F06Tq4XBUQsKaA";

async function db(table,params=""){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}});
    if(!r.ok)throw new Error(r.status);
    return await r.json();
  }catch(e){console.error(`DB error(${table}):`,e);return null;}
}

// ═══ FALLBACK ═══
const FB_IDX=[
  {name:"코스피",value:"—",change_amount:"",change_pct:"—",trend:"up"},
  {name:"코스닥",value:"—",change_amount:"",change_pct:"—",trend:"up"},
  {name:"다우존스",value:"—",change_amount:"",change_pct:"—",trend:"up"},
  {name:"나스닥",value:"—",change_amount:"",change_pct:"—",trend:"up"},
  {name:"S&P 500",value:"—",change_amount:"",change_pct:"—",trend:"up"},
  {name:"USD/KRW",value:"—",change_amount:"",change_pct:"—",trend:"up"},
];

// ═══ COMPONENTS ═══
function Sparkline({trend,data,w=56,h=26}){
  const c=trend==="up"?"#22c55e":trend==="down"?"#ef4444":"#6b7280";
  const p=useMemo(()=>{if(data&&data.length>=2){const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1,pad=2;return data.map((v,i)=>`${(i/(data.length-1))*w},${h-pad-((v-mn)/rng)*(h-pad*2)}`).join(" ")}if(data&&data.length===1)return `0,${h/2} ${w},${h/2}`;const s=trend==="up"?h*.7:h*.3,e=trend==="up"?h*.3:h*.7,m=(s+e)/2+(trend==="up"?2:-2);return `0,${s} ${w*.3},${(s*2+m)/3} ${w*.5},${m} ${w*.7},${(e*2+m)/3} ${w},${e}`},[trend,data,w,h]);
  return <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{overflow:"visible"}}><polyline points={p} fill="none" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" opacity={data&&data.length>=2?1:0.4}/></svg>;
}
function MiniBar({trend}){
  const c=trend==="up"?"34,197,94":"239,68,68";
  const b=useMemo(()=>Array.from({length:14},(_,i)=>{const v=trend==="up"?8+i*1.5:28-i*1.2;return Math.max(4,Math.min(36,v+(Math.random()-.5)*10))}),[trend]);
  return <div style={{display:"flex",alignItems:"flex-end",gap:"2px",height:"44px"}}>{b.map((h,i)=><div key={i} style={{flex:1,height:`${h}px`,borderRadius:"2px",background:`rgba(${c},${.15+(i/14)*.5})`,transition:"height .4s",transitionDelay:`${i*30}ms`}}/>)}</div>;
}
function Dot({s,size=8}){const c={positive:"#22c55e",negative:"#ef4444",neutral:"#6b7280"}[s]||"#6b7280";return <span style={{display:"inline-block",width:size,height:size,borderRadius:"50%",background:c,boxShadow:`0 0 ${size}px ${c}44`,flexShrink:0}}/>;}
function Tag({children,color="purple"}){const m={purple:{b:"rgba(139,92,246,0.12)",t:"#a78bfa"},blue:{b:"rgba(59,130,246,0.12)",t:"#60a5fa"},cyan:{b:"rgba(6,182,212,0.12)",t:"#22d3ee"}}[color]||{b:"rgba(139,92,246,0.12)",t:"#a78bfa"};return <span style={{display:"inline-block",padding:"2px 8px",background:m.b,color:m.t,borderRadius:"4px",fontSize:"10px",fontWeight:600}}>{children}</span>;}
function Box({children,style:s={},hover=true,onClick,className:cn}){const[h,setH]=useState(false);return <div className={cn} onClick={onClick} onMouseEnter={()=>hover&&setH(true)} onMouseLeave={()=>hover&&setH(false)} style={{background:h?"var(--card-hbg)":"var(--card-bg)",border:"1px solid",borderColor:h?"var(--card-hbd)":"var(--card-bd)",borderRadius:"14px",transition:"all .25s",transform:h?"translateY(-1px)":"none",cursor:onClick?"pointer":"default",...s}}>{children}</div>;}
function Loader(){return <div style={{display:"flex",justifyContent:"center",alignItems:"center",padding:"60px",gap:"12px"}}><div style={{width:20,height:20,border:"2px solid rgba(6,182,212,0.2)",borderTop:"2px solid #06b6d4",borderRadius:"50%",animation:"spin .8s linear infinite"}}/><span style={{color:"var(--muted)",fontSize:"13px"}}>데이터 로딩 중...</span></div>;}
function Empty({msg}){return <div style={{textAlign:"center",padding:"60px 20px",color:"var(--dim)"}}><div style={{fontSize:"36px",marginBottom:"12px"}}>📭</div><div style={{fontSize:"14px",lineHeight:1.6}}>{msg}</div><div style={{fontSize:"12px",marginTop:"8px",color:"var(--dimmer)"}}>GitHub Actions에서 크롤링을 실행하면 데이터가 채워집니다</div></div>;}

// ═══ NEWS ROW (호버 + 링크) ═══
function NewsRow({n,isLast}){
  const[h,setH]=useState(false);
  const inner=<div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{padding:"13px 4px",borderBottom:isLast?"none":"1px solid var(--div)",background:h?"rgba(59,130,246,0.06)":"transparent",borderRadius:h?"6px":"0",transition:"all .2s ease",cursor:n.url?"pointer":"default"}}>
    <div style={{display:"flex",gap:"10px",alignItems:"flex-start"}}><Dot s={n.sentiment} size={7}/><div style={{marginTop:"-2px"}}><div style={{fontSize:h?"14px":"13px",fontWeight:h?600:500,lineHeight:1.55,marginBottom:"5px",color:h?"#60a5fa":"inherit",transition:"all .2s ease"}}>{n.title}</div>
    <div style={{display:"flex",gap:"8px",alignItems:"center",color:"var(--muted)",fontSize:"11px"}}><span style={{fontWeight:500}}>{n.source}</span><span style={{opacity:.4}}>·</span><span>{n.time_ago}</span><Tag color="blue">{n.category}</Tag></div></div></div>
  </div>;
  if(n.url)return <a href={n.url} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none",color:"inherit",display:"block"}}>{inner}</a>;
  return inner;
}

// ═══ TAB: OVERVIEW ═══
function TabOverview({idx,stk,nws,sec,loading}){
  const[expSec,setExpSec]=useState(null);
  if(loading)return <Loader/>;
  return <div>
    <div className="grid-index" style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(idx.length||3,6)},1fr)`,gap:"10px",marginBottom:"28px"}}>
      {idx.map((m,i)=>{const urls={"코스피":"https://finance.naver.com/sise/sise_index.naver?code=KOSPI","코스닥":"https://finance.naver.com/sise/sise_index.naver?code=KOSDAQ","다우존스":"https://finance.naver.com/world/sise.naver?symbol=DJI@DJI","나스닥":"https://finance.naver.com/world/sise.naver?symbol=NAS@IXIC","S&P 500":"https://finance.naver.com/world/sise.naver?symbol=SPI@SPX","USD/KRW":"https://investing.com/currencies/usd-krw"};const url=urls[m.name];return <a key={m.name} href={url||"#"} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none",color:"inherit"}}><Box style={{padding:"18px"}}><div className={`fade-up fade-up-d${Math.min(i+1,4)}`}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}}><span className="idx-label" style={{color:"var(--muted)",fontSize:"11px",fontWeight:500}}>{m.name}</span><Sparkline trend={m.trend} data={(m.sparkline_data&&m.sparkline_data.v)||m.sparkline_data} w={44} h={20}/></div>
        <div className="idx-value" style={{fontSize:"18px",fontWeight:700,marginBottom:"2px",fontVariantNumeric:"tabular-nums"}}>{m.value}</div>
        <div style={{display:"flex",gap:"8px",alignItems:"baseline"}}><span style={{color:m.trend==="up"?"#22c55e":(m.trend==="down"?"#ef4444":"#6b7280"),fontSize:"13px",fontWeight:600}}>{m.trend==="up"?"▲":(m.trend==="down"?"▼":"─")} {m.change_pct}</span><span style={{color:"var(--dim)",fontSize:"11px"}}>{m.change_amount}</span></div>
      </div></Box></a>})}
    </div>
    <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginBottom:"16px"}}>
      <Box className="card-pad" style={{padding:"22px 24px"}} hover={false}><div className="fade-up fade-up-d2">
        <h3 style={{fontSize:"15px",fontWeight:700,marginBottom:"18px",display:"flex",alignItems:"center",gap:"8px"}}><span style={{width:24,height:24,borderRadius:"6px",display:"inline-flex",alignItems:"center",justifyContent:"center",background:"rgba(245,158,11,0.12)",color:"#f59e0b",fontSize:"11px"}}>◆</span>이슈 종목 TOP 5</h3>
        {stk.length===0?<Empty msg="이슈 종목 데이터 없음"/>:stk.slice(0,5).map((s,i)=><div key={s.code||i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 0",borderBottom:i<4?"1px solid var(--div)":"none"}}>
          <div style={{display:"flex",alignItems:"center",gap:"12px"}}><span style={{width:26,height:26,borderRadius:"7px",fontSize:"11px",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",background:i<3?"rgba(245,158,11,0.12)":"var(--badge-bg)",color:i<3?"#f59e0b":"var(--muted)"}}>{s.rank}</span>
          <div><div style={{fontWeight:600,fontSize:"14px"}}>{s.name}<span style={{color:"var(--dim)",fontSize:"11px",marginLeft:"6px",fontWeight:400}}>{s.code}</span></div><div style={{color:"var(--muted)",fontSize:"11px",marginTop:"2px"}}>{s.reason}</div></div></div>
          <div style={{textAlign:"right"}}><div style={{fontWeight:600,fontSize:"14px",fontVariantNumeric:"tabular-nums"}}>₩{s.price}</div><div style={{color:s.trend==="up"?"#22c55e":(s.trend==="down"?"#ef4444":"#6b7280"),fontSize:"12px",fontWeight:600}}>{s.trend==="up"?"▲":(s.trend==="down"?"▼":"─")} {s.change_pct}</div></div>
        </div>)}
      </div></Box>
      <Box className="card-pad" style={{padding:"22px 24px"}} hover={false}><div className="fade-up fade-up-d3">
        <h3 style={{fontSize:"15px",fontWeight:700,marginBottom:"18px",display:"flex",alignItems:"center",gap:"8px"}}><span style={{width:24,height:24,borderRadius:"6px",display:"inline-flex",alignItems:"center",justifyContent:"center",background:"rgba(59,130,246,0.12)",color:"#3b82f6",fontSize:"11px"}}>◇</span>최신 주요 뉴스</h3>
        {nws.length===0?<Empty msg="뉴스 데이터 없음"/>:nws.slice(0,5).map((n,i)=><NewsRow key={n.id||i} n={n} isLast={i===4||i===nws.slice(0,5).length-1}/>)}
      </div></Box>
    </div>
    {sec.length>0&&<Box className="card-pad" style={{padding:"22px 24px"}} hover={false}><div className="fade-up fade-up-d4">
      <h3 style={{fontSize:"15px",fontWeight:700,marginBottom:"16px",display:"flex",alignItems:"center",gap:"8px"}}><span style={{width:24,height:24,borderRadius:"6px",display:"inline-flex",alignItems:"center",justifyContent:"center",background:"rgba(139,92,246,0.12)",color:"#8b5cf6",fontSize:"11px"}}>▣</span>섹터별 등락</h3>
      <div className="grid-sector" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"10px"}}>{sec.map(s=>{const u=s.trend==="up";const isExp=expSec===s.name;return <SectorCard key={s.name} s={s} u={u} isExp={isExp} onClick={()=>setExpSec(isExp?null:s.name)}/>})}</div>
    </div></Box>}
  </div>;
}

// ═══ TAB: STOCKS ═══
function TabStocks({stk,nws,loading}){
  const[q,setQ]=useState("");const[hov,setHov]=useState(null);const[exp,setExp]=useState(null);
  if(loading)return <Loader/>;if(!stk.length)return <Empty msg="이슈 종목 데이터 없음"/>;
  const f=q?stk.filter(s=>s.name.includes(q)||s.code.includes(q)||(s.tags||[]).some(t=>t.includes(q))):stk;
  const getRelatedNews=(stock)=>{
    // 1) crawl.py에서 수집한 related_news 사용
    if(stock.related_news){
      try{
        const parsed=typeof stock.related_news==='string'?JSON.parse(stock.related_news):stock.related_news;

  const secIcons={"핵심":"🔥","자금":"💰","금리":"📈","섹터":"📊","시나리오":"🔮","결론":"🧠","해외":"🌍","환율":"💱","국내":"🇰🇷","영향":"🇰🇷","체크":"📋","전망":"📋"};
  const secColors={"핵심":"239,68,68","자금":"59,130,246","금리":"245,158,11","섹터":"139,92,246","시나리오":"6,182,212","결론":"34,197,94","해외":"99,102,241","환율":"245,158,11","국내":"59,130,246","영향":"59,130,246","체크":"168,85,247","전망":"168,85,247"};
  const getSecMeta=(title)=>{for(const[k,v]of Object.entries(secIcons)){if(title.includes(k))return{icon:v,clr:secColors[k]}}return{icon:"📌",clr:"107,114,128"}};
  const parseSections=(text)=>{
    if(!text)return[];
    const lines=text.split("\n");
    const sections=[];let cur=null;
    for(const line of lines){
      const t=line.trim();if(!t)continue;
      if(/^\d[\.\)]/.test(t)){
        if(cur)sections.push(cur);
        const title=t.replace(/^\d[\.\)]\s*/,"");
        cur={title,lines:[]};
      }else if(cur){cur.lines.push(t)}
      else{if(!sections.length){cur={title:"",lines:[t]}}}
    }
    if(cur)sections.push(cur);
    return sections;
  };
  return <div className="fade-up">
    <h2 style={{fontSize:"17px",fontWeight:700,marginBottom:"4px"}}><span style={{color:"#06b6d4"}}>⬡</span> AI 시장 브리핑</h2>
    <p style={{color:"var(--muted)",fontSize:"13px",marginBottom:"22px"}}>Groq AI 기반 매크로 전략 분석 · 크롤링 시 자동 갱신</p>
    {aiSum?<div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
          <span style={{width:36,height:36,borderRadius:"10px",background:"rgba(6,182,212,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px"}}>⬡</span>
          <div><div style={{fontWeight:700,fontSize:"15px"}}>오늘의 시장 브리핑</div><div style={{color:"var(--muted)",fontSize:"11px",marginTop:"2px"}}>{aiSum.date} {aiSum.generated_time?aiSum.generated_time+" ":""}기준</div></div>
        </div>
        {mood&&<span style={{padding:"5px 14px",borderRadius:"20px",fontSize:"12px",fontWeight:600,background:`rgba(${mood.color==="#22c55e"?"34,197,94":mood.color==="#ef4444"?"239,68,68":"107,114,128"},0.1)`,color:mood.color,display:"flex",alignItems:"center",gap:"5px"}}>{mood.emoji} {mood.label}</span>}
      </div>
      <div style={{display:"grid",gap:"12px"}}>{parseSections(aiSum.summary).map((sec,si)=>{
        const meta=getSecMeta(sec.title);
        const isConclusion=sec.title.includes("결론");
        return <Box key={si} className="ai-section" style={{padding:isConclusion?"20px 22px":"18px 22px",borderLeft:`3px solid rgba(${meta.clr},0.5)`,background:isConclusion?`rgba(${meta.clr},0.04)`:"transparent"}} hover={false}>
          {sec.title&&<div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}}><span style={{fontSize:"16px"}}>{meta.icon}</span><span style={{fontWeight:700,fontSize:"14px",color:"var(--text)"}}>{sec.title}</span></div>}
          <div style={{fontSize:"13px",lineHeight:1.8,color:"var(--text-sub)"}}>{sec.lines.map((l,li)=>{
            const isArrow=l.includes("→");const isBullet=/^[↘↗📌👉·\-\*]/.test(l);
            return <div key={li} style={{marginBottom:li<sec.lines.length-1?"6px":"0",paddingLeft:isBullet?"4px":"0",color:isArrow?"var(--text)":"inherit",fontWeight:isArrow?500:"normal"}}>{l}</div>
          })}</div>
        </Box>
      })}</div>
    </div>:<Box style={{padding:"40px",textAlign:"center"}} hover={false}>
      <div style={{fontSize:"36px",marginBottom:"12px",opacity:0.4}}>⬡</div>
      <div style={{fontWeight:600,fontSize:"15px",color:"var(--muted)",marginBottom:"6px"}}>AI 브리핑 준비 중</div>
      <div style={{fontSize:"12px",color:"var(--dim)"}}>다음 크롤링 시 자동 생성됩니다</div>
    </Box>}
    <div style={{marginTop:"20px",padding:"14px 18px",background:"rgba(245,158,11,0.04)",border:"1px solid rgba(245,158,11,0.1)",borderRadius:"10px",fontSize:"12px",color:"#b4940f",lineHeight:1.6}}>⚠️ 본 AI 분석은 정보 제공 목적입니다. 투자 판단은 본인 책임이며 투자 추천/권유가 아닙니다.</div>
  </div>;
}

// ═══ APP ═══
function App(){
  const[tab,setTab]=useState("overview");
  const[time,setTime]=useState(new Date());
  const[loading,setLoading]=useState(true);
  const[idx,setIdx]=useState(FB_IDX);
  const[stk,setStk]=useState([]);
  const[nws,setNws]=useState([]);
  const[sec,setSec]=useState([]);
  const[thm,setThm]=useState([]);
  const[aiSum,setAiSum]=useState(null);
  const[lastUp,setLastUp]=useState(null);
  const[theme,setTheme]=useState(()=>{try{return localStorage.getItem("sp-theme")||"dark"}catch(e){return "dark"}});

  useEffect(()=>{
    document.body.className=theme==="light"?"light":"";
    try{localStorage.setItem("sp-theme",theme)}catch(e){}
  },[theme]);

  useEffect(()=>{(async()=>{
    setLoading(true);
    const[a,b,c,d,e,f]=await Promise.all([db("market_index","order=id"),db("issue_stocks","order=rank&limit=15"),db("news","order=created_at.desc&limit=20"),db("sectors","order=id"),db("themes","order=rank&limit=10"),db("ai_summary","order=id.desc&limit=1")]);
    if(a?.length)setIdx(a);if(b?.length)setStk(b);if(c?.length){setNws(c);setLastUp(c[0].date)}if(d?.length)setSec(d);if(e?.length)setThm(e);if(f?.length)setAiSum(f[0]);
    setLoading(false);
  })()},[]);

  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t)},[]);
  const tabs=[{id:"overview",l:"시장 개요",ic:"◈"},{id:"themes",l:"인기 테마",ic:"◈",live:true},{id:"issues",l:"이슈 종목",ic:"◆"},{id:"news",l:"주요 뉴스",ic:"◇"},{id:"ai",l:"AI 브리핑",ic:"⬡"}];

  return <div>
    <div style={{background:"var(--ticker-bg)",borderBottom:"1px solid var(--div2)",padding:"9px 0",overflow:"hidden",position:"relative",transition:"background .3s"}}><div style={{display:"inline-flex",gap:"40px",whiteSpace:"nowrap",animation:"tickerScroll 150s linear infinite"}}>{[...idx,...idx,...idx,...idx].map((m,i)=><span key={i} style={{display:"inline-flex",alignItems:"center",gap:"7px",fontSize:"12px",paddingRight:"20px"}}><span style={{color:"var(--muted)",fontWeight:500}}>{m.name}</span><span style={{color:"var(--text)",fontWeight:600,fontVariantNumeric:"tabular-nums"}}>{m.value}</span><span style={{color:m.trend==="up"?"#22c55e":"#ef4444",fontWeight:600}}>{m.change_pct}</span></span>)}</div></div>

    <header className="header-wrap" style={{padding:"24px 40px 18px",maxWidth:1440,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div className="fade-up"><div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"3px"}}><div style={{width:8,height:8,borderRadius:"50%",background:"#22c55e",boxShadow:"0 0 10px rgba(34,197,94,0.4)",animation:"pulse 2s infinite"}}/><h1 className="header-title" style={{fontSize:"24px",fontWeight:800,letterSpacing:"-0.03em",background:"var(--h-grad)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>STOCKPULSE</h1><span style={{fontSize:"9px",padding:"3px 7px",background:"rgba(34,197,94,0.12)",color:"#22c55e",borderRadius:"4px",fontWeight:700}}>BETA</span></div>
        <div className="header-subtitle" style={{color:"var(--muted)",fontSize:"12px",letterSpacing:"0.01em",marginLeft:"18px"}}>금융시장 정보 및 데이터 분석 플랫폼</div>
      </div>
      <div className="fade-up fade-up-d1" style={{display:"flex",alignItems:"center",gap:"12px"}}>
        <div style={{textAlign:"right"}}><div style={{color:"var(--muted)",fontSize:"12px"}}>{time.toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"short"})}</div><div className="header-time-large" style={{color:"var(--text)",fontSize:"20px",fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{time.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</div></div>
        <button onClick={()=>setTheme(t=>t==="dark"?"light":"dark")} title={theme==="dark"?"라이트 모드로 전환":"다크 모드로 전환"} style={{width:38,height:38,borderRadius:"10px",border:"1px solid var(--card-bd)",background:"var(--card-bg)",cursor:"pointer",fontSize:"18px",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .25s",flexShrink:0}} onMouseEnter={e=>{e.currentTarget.style.background="var(--card-hbg)";e.currentTarget.style.borderColor="var(--card-hbd)";e.currentTarget.style.transform="translateY(-1px)"}} onMouseLeave={e=>{e.currentTarget.style.background="var(--card-bg)";e.currentTarget.style.borderColor="var(--card-bd)";e.currentTarget.style.transform="none"}}>{theme==="dark"?"☀️":"🌙"}</button>
      </div>
    </header>

    <nav className="nav-wrap" style={{maxWidth:1440,margin:"0 auto",padding:"0 40px 18px",display:"flex",gap:"3px",borderBottom:"1px solid var(--div2)",overflow:"visible"}}>{tabs.map(t=><button key={t.id} className="nav-btn" onClick={()=>setTab(t.id)} style={{padding:"9px 18px",fontFamily:"inherit",fontSize:"13px",fontWeight:tab===t.id?600:400,cursor:"pointer",background:tab===t.id?"var(--tab-bg)":"transparent",border:"1px solid",borderColor:tab===t.id?"var(--tab-bd)":"transparent",borderRadius:"8px",color:tab===t.id?"var(--text)":"var(--dim)",transition:"all .2s",display:"flex",alignItems:"center",gap:"5px",whiteSpace:"nowrap",position:t.live?"relative":"static"}}><span className="nav-btn-icon" style={{fontSize:"10px",opacity:tab===t.id?1:.6}}>{t.ic}</span><span className="nav-btn-label">{t.l}</span>{t.live&&<span style={{position:"absolute",top:"-20px",left:"50%",transform:"translateX(-50%)",background:"linear-gradient(135deg, #ff6b6b, #ef4444, #dc2626)",color:"#fff",fontSize:"9px",fontWeight:800,padding:"3px 8px",borderRadius:"6px",letterSpacing:"0.5px",lineHeight:"14px",boxShadow:"0 2px 10px rgba(239,68,68,0.45), 0 0 20px rgba(239,68,68,0.2)",animation:"liveBounce 2s ease-in-out infinite",zIndex:10,pointerEvents:"none"}}><span style={{position:"absolute",bottom:"-4px",left:"50%",transform:"translateX(-50%)",width:0,height:0,borderLeft:"5px solid transparent",borderRight:"5px solid transparent",borderTop:"5px solid #ef4444"}}/>LIVE</span>}</button>)}</nav>

    <main className="main-wrap" style={{maxWidth:1440,margin:"0 auto",padding:"22px 40px 60px"}}>
      {tab==="overview"&&<TabOverview idx={idx} stk={stk} nws={nws} sec={sec} loading={loading}/>}
      {tab==="issues"&&<TabStocks stk={stk} nws={nws} loading={loading}/>}
      {tab==="themes"&&<TabThemes thm={thm} loading={loading}/>}
      {tab==="news"&&<TabNews nws={nws} loading={loading}/>}
      {tab==="ai"&&<TabAI aiSum={aiSum} loading={loading}/>}
    </main>

    <footer style={{borderTop:"1px solid var(--div2)",maxWidth:1440,margin:"0 auto",padding:"18px 40px",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:"8px",color:"var(--dimmer)",fontSize:"11px"}}><div><span style={{fontWeight:600,color:"var(--dim)"}}>STOCKPULSE</span> © 2026 · 투자 권유 목적이 아닌 정보 제공 목적</div><div>데이터: 네이버 금융 크롤링</div></footer>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
