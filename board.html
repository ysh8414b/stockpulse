<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useRef}=React;

const PER_PAGE=20;

function isSafeUrl(url){
  if(!url)return false;
  const u=url.trim().toLowerCase();
  if(u.startsWith("http://")||u.startsWith("https://"))return true;
  if(/^[a-z0-9_\-]+\.html$/.test(u))return true;
  return false;
}

function LinkedText({text}){
  if(!text)return null;
  const pattern=/\[([^\]]+)\]\(([^)]+)\)/g;
  const parts=[];let last=0,m;
  while((m=pattern.exec(text))!==null){
    if(m.index>last)parts.push(<React.Fragment key={last}>{text.slice(last,m.index)}</React.Fragment>);
    if(isSafeUrl(m[2])){
      parts.push(<a key={m.index} href={m[2]} style={{color:"#06b6d4",textDecoration:"underline",cursor:"pointer"}} target="_blank" rel="noopener noreferrer">{m[1]}</a>);
    }else{
      parts.push(<React.Fragment key={m.index}>{m[0]}</React.Fragment>);
    }
    last=pattern.lastIndex;
  }
  if(last<text.length)parts.push(<React.Fragment key={last}>{text.slice(last)}</React.Fragment>);
  return parts.length?parts:text;
}

async function hashPassword(pw){
  const enc=new TextEncoder().encode(pw);
  const buf=await crypto.subtle.digest("SHA-256",enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

function fmt(dateStr){
  const d=new Date(dateStr);
  const now=new Date();
  const isToday=d.toDateString()===now.toDateString();
  if(isToday)return d.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
  return d.toLocaleDateString("ko-KR",{month:"numeric",day:"numeric"});
}
function fmtFull(dateStr){
  const d=new Date(dateStr);
  return d.toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric"})+" "+d.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
}

function Box({children,style,hover=true}){
  const[h,setH]=useState(false);
  return <div style={{background:h&&hover?"var(--card-hbg)":"var(--card-bg)",border:"1px solid",borderColor:h&&hover?"var(--card-hbd)":"var(--card-bd)",borderRadius:"12px",padding:"18px 22px",transition:"all .25s",...style}} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}>{children}</div>;
}

function Loader(){return <div style={{display:"flex",justifyContent:"center",padding:"60px 0"}}><div style={{width:28,height:28,border:"3px solid var(--div3)",borderTop:"3px solid #06b6d4",borderRadius:"50%",animation:"spin 1s linear infinite"}}/></div>}

function PasswordModal({onConfirm,onCancel,title="삭제 확인",desc="작성 시 입력한 비밀번호를 입력하세요.",btnText="삭제",btnClass="board-btn-danger"}){
  const[pw,setPw]=useState("");
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);
  const submit=async()=>{
    if(!pw.trim()){setErr("비밀번호를 입력하세요");return}
    setLoading(true);setErr("");
    const h=await hashPassword(pw.trim());
    const ok=await onConfirm(h);
    if(!ok){setErr("비밀번호가 일치하지 않습니다");setLoading(false)}
  };
  return <div className="modal-overlay" onClick={onCancel}>
    <div className="modal-box" onClick={e=>e.stopPropagation()}>
      <div style={{fontWeight:700,fontSize:"16px",marginBottom:"14px"}}>{title}</div>
      <div style={{color:"var(--text-sub)",fontSize:"13px",marginBottom:"14px"}}>{desc}</div>
      <input type="password" className="board-input" placeholder="비밀번호" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} autoFocus/>
      {err&&<div style={{color:"#ef4444",fontSize:"13px",marginTop:"8px"}}>{err}</div>}
      <div style={{display:"flex",gap:"8px",marginTop:"16px",justifyContent:"flex-end"}}>
        <button className="board-btn board-btn-secondary" onClick={onCancel} disabled={loading}>취소</button>
        <button className={"board-btn "+btnClass} onClick={submit} disabled={loading}>{loading?"확인 중...":btnText}</button>
      </div>
    </div>
  </div>;
}

function CommentForm({postId,onAdded}){
  const[nick,setNick]=useState("");
  const[pw,setPw]=useState("");
  const[content,setContent]=useState("");
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");

  const submit=async()=>{
    if(!nick.trim()||nick.trim().length<1){setErr("닉네임을 입력하세요");return}
    if(!pw.trim()||pw.trim().length<2){setErr("비밀번호는 2자 이상");return}
    if(!content.trim()){setErr("내용을 입력하세요");return}
    setLoading(true);setErr("");
    try{
      const h=await hashPassword(pw.trim());
      const r=await fetch(SB_URL+"/rest/v1/rpc/insert_board_comment",{method:"POST",headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,"Content-Type":"application/json"},body:JSON.stringify({p_post_id:postId,p_nickname:nick.trim(),p_password_hash:h,p_content:content.trim()})});
      if(!r.ok){const t=await r.text();if(t.includes("too_fast"))throw new Error("too_fast");if(t.includes("reserved_name"))throw new Error("reserved_name");if(t.includes("banned_nickname"))throw new Error("banned_nickname");throw new Error(r.status)}
      setContent("");setErr("");
      onAdded();
    }catch(e){setErr(e.message==="too_fast"?"잠시 후 다시 시도하세요 (15초)":e.message==="reserved_name"?"사용할 수 없는 닉네임입니다":e.message==="banned_nickname"?"사용이 제한된 닉네임입니다":"댓글 등록 실패: "+e.message)}
    setLoading(false);
  };

  return <Box hover={false} style={{marginTop:"16px",padding:"16px 18px"}}>
    <div style={{fontWeight:600,fontSize:"14px",marginBottom:"12px"}}>댓글 작성</div>
    <div style={{display:"flex",gap:"8px",marginBottom:"8px",flexWrap:"wrap"}}>
      <input className="board-input" placeholder="닉네임" value={nick} onChange={e=>setNick(e.target.value)} maxLength={10} style={{flex:"1 1 100px",minWidth:"80px"}}/>
      <input className="board-input" type="password" placeholder="비밀번호" value={pw} onChange={e=>setPw(e.target.value)} maxLength={20} style={{flex:"1 1 100px",minWidth:"80px"}}/>
    </div>
    <div style={{display:"flex",gap:"8px"}}>
      <input className="board-input" placeholder="댓글 내용을 입력하세요" value={content} onChange={e=>setContent(e.target.value)} maxLength={500} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&submit()} style={{flex:1}}/>
      <button className="board-btn board-btn-primary" onClick={submit} disabled={loading} style={{flexShrink:0}}>{loading?"...":"등록"}</button>
    </div>
    {err&&<div style={{color:"#ef4444",fontSize:"13px",marginTop:"6px"}}>{err}</div>}
  </Box>;
}

function CommentItem({c,onDelete,onEdited}){
  const[editMode,setEditMode]=useState(false);
  const[editPwModal,setEditPwModal]=useState(false);
  const[editHash,setEditHash]=useState("");
  const[editContent,setEditContent]=useState("");
  const[editLoading,setEditLoading]=useState(false);
  const[editErr,setEditErr]=useState("");

  const handleEditAuth=async(hash)=>{
    try{
      const r=await fetch(SB_URL+"/rest/v1/rpc/update_board_comment",{method:"POST",headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,"Content-Type":"application/json"},body:JSON.stringify({c_id:c.id,c_hash:hash,c_content:c.content})});
      if(!r.ok)throw new Error();
      const result=await r.json();
      if(result===true){setEditPwModal(false);setEditHash(hash);setEditContent(c.content);setEditMode(true);return true}
      return false;
    }catch(e){return false}
  };

  const submitEdit=async()=>{
    if(!editContent.trim()){setEditErr("내용을 입력하세요");return}
    setEditLoading(true);setEditErr("");
    try{
      const r=await fetch(SB_URL+"/rest/v1/rpc/update_board_comment",{method:"POST",headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,"Content-Type":"application/json"},body:JSON.stringify({c_id:c.id,c_hash:editHash,c_content:editContent.trim()})});
      if(!r.ok)throw new Error();
      const result=await r.json();
      if(result===true){setEditMode(false);setEditHash("");onEdited()}
      else{setEditErr("수정 실패")}
    }catch(e){setEditErr("수정 실패")}
    setEditLoading(false);
  };

  return <div className="comment-item">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>
      <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
        <span style={{fontWeight:600,fontSize:"13px",color:"var(--text)"}}>{c.nickname}</span>
        <span style={{fontSize:"12px",color:"var(--muted)"}}>{fmtFull(c.created_at)}</span>
      </div>
      {!editMode&&<div style={{display:"flex",gap:"4px"}}>
        <button onClick={()=>setEditPwModal(true)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:"12px",padding:"2px 6px",transition:"color .2s"}} onMouseEnter={e=>e.currentTarget.style.color="#06b6d4"} onMouseLeave={e=>e.currentTarget.style.color="var(--muted)"}>수정</button>
        <button onClick={()=>onDelete(c.id)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:"12px",padding:"2px 6px",transition:"color .2s"}} onMouseEnter={e=>e.currentTarget.style.color="#ef4444"} onMouseLeave={e=>e.currentTarget.style.color="var(--muted)"}>삭제</button>
      </div>}
    </div>
    {editMode?<div>
      <input className="board-input" value={editContent} onChange={e=>setEditContent(e.target.value)} maxLength={500} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&submitEdit()}/>
      {editErr&&<div style={{color:"#ef4444",fontSize:"12px",marginTop:"4px"}}>{editErr}</div>}
      <div style={{display:"flex",gap:"6px",marginTop:"8px",justifyContent:"flex-end"}}>
        <button className="board-btn board-btn-secondary" onClick={()=>{setEditMode(false);setEditHash("")}} disabled={editLoading} style={{padding:"5px 12px",fontSize:"12px"}}>취소</button>
        <button className="board-btn board-btn-primary" onClick={submitEdit} disabled={editLoading} style={{padding:"5px 12px",fontSize:"12px"}}>{editLoading?"...":"수정"}</button>
      </div>
    </div>:
    <div style={{fontSize:"14px",lineHeight:1.7,color:"var(--text-sub)",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{c.content}</div>}
    {editPwModal&&<PasswordModal onConfirm={handleEditAuth} onCancel={()=>setEditPwModal(false)} title="댓글 수정" desc="작성 시 입력한 비밀번호를 입력하세요." btnText="확인" btnClass="board-btn-primary"/>}
  </div>;
}

function WriteForm({onCancel,onSaved}){
  const[nick,setNick]=useState("");
  const[pw,setPw]=useState("");
  const[title,setTitle]=useState("");
  const[content,setContent]=useState("");
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");

  const submit=async()=>{
    if(!nick.trim()||nick.trim().length<1){setErr("닉네임을 입력하세요");return}
    if(!pw.trim()||pw.trim().length<2){setErr("비밀번호는 2자 이상");return}
    if(!title.trim()){setErr("제목을 입력하세요");return}
    if(!content.trim()){setErr("내용을 입력하세요");return}
    setLoading(true);setErr("");
    try{
      const h=await hashPassword(pw.trim());
      const r=await fetch(SB_URL+"/rest/v1/rpc/insert_board_post",{method:"POST",headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,"Content-Type":"application/json"},body:JSON.stringify({p_nickname:nick.trim(),p_password_hash:h,p_title:title.trim(),p_content:content.trim()})});
      if(!r.ok){const t=await r.text();if(t.includes("too_fast"))throw new Error("too_fast");if(t.includes("reserved_name"))throw new Error("reserved_name");if(t.includes("banned_nickname"))throw new Error("banned_nickname");throw new Error(r.status)}
      onSaved();
    }catch(e){setErr(e.message==="too_fast"?"잠시 후 다시 시도하세요 (30초)":e.message==="reserved_name"?"사용할 수 없는 닉네임입니다":e.message==="banned_nickname"?"사용이 제한된 닉네임입니다":"글 등록 실패: "+e.message)}
    setLoading(false);
  };

  return <div className="fade-up">
    <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"20px"}}>
      <button className="board-btn board-btn-secondary" onClick={onCancel} style={{padding:"8px 14px",fontSize:"13px"}}>← 목록</button>
      <span style={{fontWeight:700,fontSize:"18px"}}>글쓰기</span>
    </div>
    <Box hover={false} style={{padding:"24px"}}>
      <div style={{display:"flex",gap:"10px",marginBottom:"12px",flexWrap:"wrap"}}>
        <input className="board-input" placeholder="닉네임" value={nick} onChange={e=>setNick(e.target.value)} maxLength={10} style={{flex:"1 1 140px"}}/>
        <input className="board-input" type="password" placeholder="비밀번호 (삭제 시 필요)" value={pw} onChange={e=>setPw(e.target.value)} maxLength={20} style={{flex:"1 1 140px"}}/>
      </div>
      <input className="board-input" placeholder="제목" value={title} onChange={e=>setTitle(e.target.value)} maxLength={100} style={{marginBottom:"12px"}}/>
      <textarea className="board-textarea" placeholder="내용을 입력하세요" value={content} onChange={e=>setContent(e.target.value)} maxLength={5000}/>
      {err&&<div style={{color:"#ef4444",fontSize:"13px",marginTop:"8px"}}>{err}</div>}
      <div style={{display:"flex",gap:"8px",marginTop:"16px",justifyContent:"flex-end"}}>
        <button className="board-btn board-btn-secondary" onClick={onCancel}>취소</button>
        <button className="board-btn board-btn-primary" onClick={submit} disabled={loading}>{loading?"등록 중...":"등록하기"}</button>
      </div>
    </Box>
  </div>;
}

function PostDetail({postId,onBack}){
  const[post,setPost]=useState(null);
  const[comments,setComments]=useState([]);
  const[loading,setLoading]=useState(true);
  const[delTarget,setDelTarget]=useState(null); // {type:'post'}|{type:'comment',id:N}
  const[pinModal,setPinModal]=useState(false);
  const[editModal,setEditModal]=useState(false);
  const[editing,setEditing]=useState(false);
  const[editHash,setEditHash]=useState("");
  const[editTitle,setEditTitle]=useState("");
  const[editContent,setEditContent]=useState("");
  const[editLoading,setEditLoading]=useState(false);
  const[editErr,setEditErr]=useState("");

  const loadPost=useCallback(async()=>{
    const data=await db("board_posts_public","id=eq."+postId);
    if(data&&data.length>0)setPost(data[0]);
    setLoading(false);
  },[postId]);

  const loadComments=useCallback(async()=>{
    const data=await db("board_comments_public","post_id=eq."+postId+"&order=created_at.asc");
    if(data)setComments(data);
  },[postId]);

  useEffect(()=>{loadPost();loadComments();},[loadPost,loadComments]);

  const handleDelete=async(hash)=>{
    if(!delTarget)return false;
    try{
      const fn=delTarget.type==="post"?"delete_board_post":"delete_board_comment";
      const args=delTarget.type==="post"?{p_id:postId,p_hash:hash}:{c_id:delTarget.id,c_hash:hash};
      const r=await fetch(SB_URL+"/rest/v1/rpc/"+fn,{method:"POST",headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,"Content-Type":"application/json"},body:JSON.stringify(args)});
      if(!r.ok)throw new Error(r.status);
      const result=await r.json();
      if(result===true){
        setDelTarget(null);
        if(delTarget.type==="post"){onBack()}else{loadComments()}
        return true;
      }
      return false;
    }catch(e){console.error("Delete error:",e);return false}
  };

  const handlePin=async(hash)=>{
    try{
      const r=await fetch(SB_URL+"/rest/v1/rpc/toggle_pin_post",{method:"POST",headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,"Content-Type":"application/json"},body:JSON.stringify({p_id:postId,p_hash:hash})});
      if(!r.ok)throw new Error(r.status);
      const result=await r.json();
      if(result===true){setPinModal(false);loadPost();return true}
      return false;
    }catch(e){console.error("Pin error:",e);return false}
  };

  const handleEditAuth=async(hash)=>{
    try{
      // 비밀번호 검증: update RPC를 현재 내용 그대로 호출해서 확인
      const r=await fetch(SB_URL+"/rest/v1/rpc/update_board_post",{method:"POST",headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,"Content-Type":"application/json"},body:JSON.stringify({p_id:postId,p_hash:hash,p_title:post.title,p_content:post.content})});
      if(!r.ok)throw new Error(r.status);
      const result=await r.json();
      if(result===true){
        setEditModal(false);
        setEditHash(hash);
        setEditTitle(post.title);
        setEditContent(post.content);
        setEditing(true);
        return true;
      }
      return false;
    }catch(e){console.error("Edit auth error:",e);return false}
  };

  const submitEdit=async()=>{
    if(!editTitle.trim()){setEditErr("제목을 입력하세요");return}
    if(!editContent.trim()){setEditErr("내용을 입력하세요");return}
    setEditLoading(true);setEditErr("");
    try{
      const r=await fetch(SB_URL+"/rest/v1/rpc/update_board_post",{method:"POST",headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,"Content-Type":"application/json"},body:JSON.stringify({p_id:postId,p_hash:editHash,p_title:editTitle.trim(),p_content:editContent.trim()})});
      if(!r.ok)throw new Error(r.status);
      const result=await r.json();
      if(result===true){setEditing(false);setEditHash("");loadPost()}
      else{setEditErr("수정 실패")}
    }catch(e){setEditErr("수정 실패: "+e.message)}
    setEditLoading(false);
  };

  if(loading)return <Loader/>;
  if(!post)return <div className="fade-up" style={{textAlign:"center",padding:"60px 0",color:"var(--muted)"}}>
    <div style={{fontSize:"36px",marginBottom:"10px"}}>😥</div>
    <div>글을 찾을 수 없습니다.</div>
    <button className="board-btn board-btn-secondary" onClick={onBack} style={{marginTop:"16px"}}>목록으로</button>
  </div>;

  return <div className="fade-up">
    <button className="board-btn board-btn-secondary" onClick={onBack} style={{padding:"8px 14px",fontSize:"13px",marginBottom:"20px"}}>← 목록</button>

    <Box hover={false} style={{padding:"24px",marginBottom:"20px"}}>
      {editing?<>
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"16px"}}>
          <span style={{fontWeight:700,fontSize:"18px"}}>글 수정</span>
        </div>
        <input className="board-input" value={editTitle} onChange={e=>setEditTitle(e.target.value)} maxLength={100} style={{marginBottom:"12px"}} placeholder="제목"/>
        <textarea className="board-textarea" value={editContent} onChange={e=>setEditContent(e.target.value)} maxLength={5000} placeholder="내용"/>
        {editErr&&<div style={{color:"#ef4444",fontSize:"13px",marginTop:"8px"}}>{editErr}</div>}
        <div style={{display:"flex",gap:"8px",marginTop:"16px",justifyContent:"flex-end"}}>
          <button className="board-btn board-btn-secondary" onClick={()=>{setEditing(false);setEditHash("")}} disabled={editLoading}>취소</button>
          <button className="board-btn board-btn-primary" onClick={submitEdit} disabled={editLoading}>{editLoading?"수정 중...":"수정완료"}</button>
        </div>
      </>:<>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"14px",gap:"10px",flexWrap:"wrap"}}>
          <h2 style={{fontSize:"20px",fontWeight:700,lineHeight:1.4,flex:1,wordBreak:"break-word"}}>{post.is_pinned&&<span style={{color:"#06b6d4",fontSize:"13px",marginRight:"8px"}}>📌 공지</span>}{post.title}</h2>
          <div style={{display:"flex",gap:"6px",flexShrink:0}}>
            <button className="board-btn board-btn-secondary" onClick={()=>setEditModal(true)} style={{padding:"6px 14px",fontSize:"12px"}}>수정</button>
            <button className="board-btn board-btn-secondary" onClick={()=>setPinModal(true)} style={{padding:"6px 14px",fontSize:"12px"}}>{post.is_pinned?"📌 공지해제":"📌 공지등록"}</button>
            <button className="board-btn board-btn-danger" onClick={()=>setDelTarget({type:"post"})} style={{padding:"6px 14px",fontSize:"12px"}}>삭제</button>
          </div>
        </div>
        <div style={{display:"flex",gap:"12px",alignItems:"center",color:"var(--muted)",fontSize:"13px",marginBottom:"18px",paddingBottom:"14px",borderBottom:"1px solid var(--div)"}}>
          <span style={{fontWeight:600,color:"var(--text-sub)"}}>{post.nickname}</span>
          <span>{fmtFull(post.created_at)}</span>
          {post.updated_at&&post.updated_at!==post.created_at&&<span style={{color:"#06b6d4",fontSize:"12px"}}>(수정됨)</span>}
        </div>
        <div style={{fontSize:"15px",lineHeight:1.8,color:"var(--text-sub)",whiteSpace:"pre-wrap",wordBreak:"break-word"}}><LinkedText text={post.content}/></div>
      </>}
    </Box>

    <div style={{marginBottom:"8px",fontWeight:600,fontSize:"15px"}}>댓글 {comments.length}개</div>
    <Box hover={false} style={{padding:comments.length?"16px 18px":"18px"}}>
      {comments.length===0?<div style={{textAlign:"center",padding:"20px",color:"var(--muted)",fontSize:"14px"}}>첫 댓글을 남겨보세요!</div>:
        comments.map(c=><CommentItem key={c.id} c={c} onDelete={(id)=>setDelTarget({type:"comment",id})} onEdited={loadComments}/>)
      }
    </Box>

    <CommentForm postId={postId} onAdded={loadComments}/>

    {delTarget&&<PasswordModal onConfirm={handleDelete} onCancel={()=>setDelTarget(null)}/>}
    {pinModal&&<PasswordModal onConfirm={handlePin} onCancel={()=>setPinModal(false)} title="공지 설정" desc="관리자 비밀번호를 입력하세요." btnText="확인" btnClass="board-btn-primary"/>}
    {editModal&&<PasswordModal onConfirm={handleEditAuth} onCancel={()=>setEditModal(false)} title="글 수정" desc="작성 시 입력한 비밀번호를 입력하세요." btnText="확인" btnClass="board-btn-primary"/>}
  </div>;
}

function App(){
  const[theme,setTheme]=useState(getStoredTheme());
  const[view,setView]=useState("list"); // list|detail|write
  const[posts,setPosts]=useState([]);
  const[page,setPage]=useState(1);
  const[total,setTotal]=useState(0);
  const[loading,setLoading]=useState(true);
  const[selectedPost,setSelectedPost]=useState(null);
  const[search,setSearch]=useState("");
  const[searchQuery,setSearchQuery]=useState("");
  const searchRef=useRef(null);

  useEffect(()=>{applyTheme(theme);setStoredTheme(theme)},[theme]);

  const loadPosts=useCallback(async(p,q)=>{
    setLoading(true);
    const offset=(p-1)*PER_PAGE;
    try{
      const filter=q?"&or=(title.ilike.*"+encodeURIComponent(q)+"*,nickname.ilike.*"+encodeURIComponent(q)+"*)":"";
      const cntR=await fetch(SB_URL+"/rest/v1/board_posts_public?select=id&limit=0"+filter,{headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,"Prefer":"count=exact"}});
      const cnt=parseInt(cntR.headers.get("content-range")?.split("/")?.[1]||"0");
      setTotal(cnt);

      const data=await db("board_posts_public","order=is_pinned.desc,created_at.desc&limit="+PER_PAGE+"&offset="+offset+filter);
      if(data)setPosts(data);
    }catch(e){console.error("Load posts error:",e)}
    setLoading(false);
  },[]);

  useEffect(()=>{if(view==="list")loadPosts(page,searchQuery)},[view,page,searchQuery,loadPosts]);

  const doSearch=()=>{setPage(1);setSearchQuery(search.trim())};
  const clearSearch=()=>{setSearch("");setSearchQuery("");setPage(1)};

  const totalPages=Math.ceil(total/PER_PAGE);

  const openPost=(id)=>{setSelectedPost(id);setView("detail")};
  const goList=()=>{setView("list");setSelectedPost(null)};

  return <div>
    <header className="page-header">
      <a href="index.html" className="page-back">← STOCKPULSE</a>
      <button onClick={()=>setTheme(t=>t==="dark"?"light":"dark")} style={{width:36,height:36,borderRadius:"10px",border:"1px solid var(--card-bd)",background:"var(--card-bg)",cursor:"pointer",fontSize:"18px",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .25s"}} onMouseEnter={e=>{e.currentTarget.style.background="var(--card-hbg)"}} onMouseLeave={e=>{e.currentTarget.style.background="var(--card-bg)"}}>{theme==="dark"?"☀️":"🌙"}</button>
    </header>

    <div className="page-wrap">
      {view==="list"&&<div className="fade-up">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px",flexWrap:"wrap",gap:"10px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
            <span style={{fontSize:"24px"}}>📋</span>
            <h1 style={{fontSize:"22px",fontWeight:800}}>자유게시판</h1>
            <span style={{fontSize:"13px",color:"var(--muted)"}}>총 {total}개</span>
          </div>
          <button className="board-btn board-btn-primary" onClick={()=>setView("write")}>글쓰기</button>
        </div>

        <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
          <input ref={searchRef} className="board-input" placeholder="제목 또는 작성자 검색" value={search} onChange={e=>setSearch(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()} style={{flex:1}}/>
          <button className="board-btn board-btn-secondary" onClick={doSearch} style={{padding:"10px 16px",flexShrink:0}}>검색</button>
          {searchQuery&&<button className="board-btn board-btn-secondary" onClick={clearSearch} style={{padding:"10px 14px",flexShrink:0,color:"var(--muted)"}}>✕</button>}
        </div>
        {searchQuery&&<div style={{fontSize:"13px",color:"var(--muted)",marginBottom:"12px"}}>"{searchQuery}" 검색 결과 {total}건</div>}

        {loading?<Loader/>:<>
          {posts.length===0?<Box hover={false} style={{textAlign:"center",padding:"60px 20px"}}>
            <div style={{fontSize:"36px",marginBottom:"10px"}}>{searchQuery?"🔍":"📝"}</div>
            <div style={{color:"var(--muted)",fontSize:"15px",marginBottom:"16px"}}>{searchQuery?"검색 결과가 없습니다.":"아직 게시글이 없습니다."}</div>
            {searchQuery?<button className="board-btn board-btn-secondary" onClick={clearSearch}>검색 초기화</button>:<button className="board-btn board-btn-primary" onClick={()=>setView("write")}>첫 글 작성하기</button>}
          </Box>:
          <Box hover={false} style={{padding:0,overflow:"hidden"}}>
            <table className="board-table">
              <thead><tr>
                <th className="col-id">번호</th>
                <th>제목</th>
                <th className="col-nick">작성자</th>
                <th className="col-date">날짜</th>
                <th className="col-cmt">💬</th>
              </tr></thead>
              <tbody>{posts.map((p,i)=>{
                const num=total-((page-1)*PER_PAGE)-i;
                return <tr key={p.id} style={p.is_pinned?{background:"rgba(6,182,212,0.04)"}:{}}>
                  <td className="col-id">{p.is_pinned?<span style={{color:"#06b6d4",fontWeight:700,fontSize:"12px"}}>📌</span>:num}</td>
                  <td className="col-title" onClick={()=>openPost(p.id)}>
                    <div style={{fontWeight:p.is_pinned?700:500}}>{p.is_pinned&&<span style={{color:"#06b6d4",fontSize:"12px",marginRight:"6px",fontWeight:700}}>[공지]</span>}{p.title}</div>
                    <div className="board-meta-mobile">
                      <span>{p.nickname}</span>
                      <span>{fmt(p.created_at)}</span>
                      {p.comment_count>0&&<span>💬 {p.comment_count}</span>}
                    </div>
                  </td>
                  <td className="col-nick">{p.nickname}</td>
                  <td className="col-date">{fmt(p.created_at)}</td>
                  <td className="col-cmt">{p.comment_count>0?p.comment_count:""}</td>
                </tr>
              })}</tbody>
            </table>
          </Box>}

          {totalPages>1&&<div className="pagination">
            {page>1&&<button onClick={()=>setPage(1)}>«</button>}
            {page>1&&<button onClick={()=>setPage(p=>p-1)}>‹</button>}
            {Array.from({length:totalPages},(_,i)=>i+1).filter(p=>Math.abs(p-page)<=2||p===1||p===totalPages).reduce((acc,p,i,arr)=>{
              if(i>0&&p-arr[i-1]>1)acc.push(<span key={"e"+p} style={{padding:"0 4px",color:"var(--muted)",alignSelf:"center"}}>…</span>);
              acc.push(<button key={p} className={p===page?"active":""} onClick={()=>setPage(p)}>{p}</button>);
              return acc;
            },[])}
            {page<totalPages&&<button onClick={()=>setPage(p=>p+1)}>›</button>}
            {page<totalPages&&<button onClick={()=>setPage(totalPages)}>»</button>}
          </div>}
        </>}
      </div>}

      {view==="write"&&<WriteForm onCancel={goList} onSaved={()=>{setPage(1);goList()}}/>}

      {view==="detail"&&selectedPost&&<PostDetail postId={selectedPost} onBack={goList}/>}
    </div>

    <footer style={{borderTop:"1px solid var(--div2)",maxWidth:900,margin:"0 auto",padding:"18px 40px",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:"8px",color:"var(--dimmer)",fontSize:"13px"}}>
      <div><span style={{fontWeight:600,color:"var(--dim)"}}>STOCKPULSE</span> © 2026</div>
      <div className="footer-links">
        <a href="index.html">메인</a>
        <a href="chat.html">토론방</a>
        <a href="archive.html">AI 아카이브</a>
        <a href="guide.html">가이드</a>
      </div>
    </footer>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
